<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IB Interview Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: #2a2a2a;
  --accent: #c9a84c;
  --accent2: #e8c97a;
  --text: #f0ece4;
  --text-dim: #888880;
  --text-muted: #444440;
  --green: #4caf7d;
  --red: #e05252;
  --blue: #5b8dee;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100%;
}

/* ── Header ── */
header {
  width: 100%;
  padding: 18px 20px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 10;
}
header h1 { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--accent); }
header span { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-top: 2px; }

/* ── App ── */
.app { width: 100%; max-width: 860px; padding: 16px 14px 60px; display: flex; flex-direction: column; gap: 14px; }

/* ── Filters ── */
.filters { display: flex; flex-wrap: nowrap; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
.filters::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 5px 11px;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0a0a0a; font-weight: 500; }

/* ── Stats ── */
.stats-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  flex-wrap: wrap;
}
.stat { display: flex; flex-direction: column; gap: 1px; }
.stat-val { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
.stat-val.green { color: var(--green); }
.stat-val.red { color: var(--red); }
.stat-label { font-family: 'DM Mono', monospace; font-size: 0.55rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
.divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }
.progress-wrap { flex: 1; min-width: 80px; display: flex; flex-direction: column; gap: 4px; }
.progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }
.progress-label { font-family: 'DM Mono', monospace; font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }

/* ── Card ── */
.card-area { perspective: 1400px; height: 380px; cursor: pointer; }
@media (max-width: 480px) { .card-area { height: 340px; } }
.card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); }
.card-inner.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: var(--surface);
  overflow: hidden;
}
@media (max-width: 480px) { .card-face { padding: 18px 18px; } }
.card-face.back { transform: rotateY(180deg); background: var(--surface2); border-color: rgba(201,168,76,0.3); }
.card-tag { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; flex-shrink: 0; }
.card-tag-back { color: var(--text-muted); }
.card-body { flex: 1; display: flex; align-items: center; overflow: hidden; }
.card-q { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 400; line-height: 1.5; color: var(--text); }
@media (max-width: 480px) { .card-q { font-size: 1.05rem; } }
.card-a { font-size: 0.84rem; line-height: 1.78; color: var(--text); font-weight: 300; overflow-y: auto; max-height: 230px; -webkit-overflow-scrolling: touch; padding-right: 4px; }
@media (max-width: 480px) { .card-a { font-size: 0.8rem; max-height: 190px; } }
.card-a::-webkit-scrollbar { width: 3px; }
.card-a::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.card-a strong { color: var(--accent2); font-weight: 500; }
.card-a em { color: var(--text-dim); }
.math { font-family: 'DM Mono', monospace; font-size: 0.82rem; color: var(--accent2); background: rgba(201,168,76,0.09); padding: 1px 6px; border-radius: 3px; }
.card-hint { font-family: 'DM Mono', monospace; font-size: 0.55rem; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase; text-align: right; flex-shrink: 0; margin-top: 6px; }

/* ── Study panel (on back of card) ── */
.study-panel {
  background: rgba(201,168,76,0.06);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 4px;
  padding: 8px 12px;
  margin-top: 8px;
  flex-shrink: 0;
  display: none;
}
.study-panel-title { font-family: 'DM Mono', monospace; font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
.study-panel a { display: block; font-size: 0.75rem; color: var(--blue); text-decoration: none; padding: 2px 0; }
.study-panel a:hover { text-decoration: underline; }

/* ── Controls ── */
.controls { display: flex; align-items: center; gap: 8px; justify-content: center; flex-wrap: wrap; }
.btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 9px 18px;
  border-radius: 3px;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { border-color: var(--text-dim); color: var(--text); }
.btn:active { background: var(--surface2); }
.btn-know { border-color: var(--green); color: var(--green); }
.btn-know:hover { background: var(--green); color: #0a0a0a; }
.btn-missed { border-color: var(--red); color: var(--red); }
.btn-missed:hover { background: var(--red); color: #fff; }
.btn-primary { border-color: var(--accent); color: var(--accent); }
.btn-primary:hover { background: var(--accent); color: #0a0a0a; }
.card-counter { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--text-muted); min-width: 65px; text-align: center; }
.feedback-row { display: flex; gap: 8px; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.22s; }
.feedback-row.visible { opacity: 1; pointer-events: all; }

/* ── Complete Screen ── */
.complete-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 14px;
  padding: 48px 32px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.complete-screen.visible { display: flex; }
.complete-screen h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--accent); }
.score-big { font-family: 'Playfair Display', serif; font-size: 3rem; }
.score-big span { color: var(--accent); }
.complete-screen > p { color: var(--text-dim); font-size: 0.87rem; max-width: 380px; line-height: 1.65; }
.comp-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }

/* ── Study section on complete screen ── */
.study-section { width: 100%; max-width: 420px; border-top: 1px solid var(--border); padding-top: 16px; text-align: left; }
.study-section h3 { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
.study-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
.study-item-cat { font-size: 0.8rem; font-weight: 500; color: var(--text); }
.study-item-missed { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--red); margin-left: 8px; }
.study-item-links { margin-top: 5px; display: flex; flex-direction: column; gap: 3px; }
.study-item-links a { font-size: 0.75rem; color: var(--blue); text-decoration: none; }
.study-item-links a:hover { text-decoration: underline; }

/* ── KB hint ── */
.kb-hint { font-family: 'DM Mono', monospace; font-size: 0.57rem; color: var(--text-muted); text-align: center; letter-spacing: 0.08em; }
.kb-hint kbd { background: var(--surface); border: 1px solid var(--border); padding: 1px 5px; border-radius: 2px; }
@media (max-width: 600px) { .kb-hint { display: none; } }
</style>
</head>
<body>

<header>
  <div>
    <h1>IB Interview Prep</h1>
    <span>225 cards · Summer Analyst 2026</span>
  </div>
  <button class="btn" onclick="shuffleDeck()" style="padding:7px 14px;font-size:0.6rem;">⇄ Shuffle</button>
</header>

<div class="app">
  <div class="filters" id="filters"></div>

  <div class="stats-bar">
    <div class="stat"><span class="stat-val green" id="stat-known">0</span><span class="stat-label">Known</span></div>
    <div class="divider"></div>
    <div class="stat"><span class="stat-val red" id="stat-missed">0</span><span class="stat-label">Review</span></div>
    <div class="divider"></div>
    <div class="stat"><span class="stat-val" id="stat-remaining">—</span><span class="stat-label">Left</span></div>
    <div class="divider"></div>
    <div class="progress-wrap">
      <div class="progress-label" id="progress-label">0% complete</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>

  <div id="card-area" class="card-area" onclick="flipCard()">
    <div class="card-inner" id="card-inner">
      <div class="card-face front">
        <div style="display:flex;flex-direction:column;height:100%;">
          <div class="card-tag" id="card-tag"></div>
          <div class="card-body"><div class="card-q" id="card-q"></div></div>
        </div>
        <div class="card-hint">Tap to reveal answer</div>
      </div>
      <div class="card-face back">
        <div style="display:flex;flex-direction:column;height:100%;">
          <div class="card-tag card-tag-back" id="card-tag-back">Answer</div>
          <div class="card-body"><div class="card-a" id="card-a"></div></div>
          <div class="study-panel" id="study-panel">
            <div class="study-panel-title">Didn't get this? Revisit:</div>
            <div id="study-panel-links"></div>
          </div>
        </div>
        <div class="card-hint">Rate yourself below</div>
      </div>
    </div>
  </div>

  <div class="complete-screen" id="complete-screen">
    <h2>Session Complete</h2>
    <div class="score-big" id="score-big"></div>
    <p id="score-msg"></p>
    <div class="comp-btns">
      <button class="btn btn-primary" onclick="restartAll()">Restart All</button>
      <button class="btn btn-missed" onclick="restartMissed()">Review Missed Only</button>
    </div>
    <div class="study-section" id="study-section" style="display:none">
      <h3>Topics to Revisit</h3>
      <div id="study-list"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" onclick="prevCard()">← Prev</button>
    <span class="card-counter" id="card-counter">1 / —</span>
    <button class="btn" onclick="nextCard()">Next →</button>
  </div>

  <div class="feedback-row" id="feedback-row">
    <button class="btn btn-missed" onclick="markCard(false)">✗ Missed</button>
    <button class="btn btn-know" onclick="markCard(true)">✓ Got it</button>
  </div>

  <div class="kb-hint">
    <kbd>Space</kbd> flip &nbsp;·&nbsp; <kbd>→</kbd> next &nbsp;·&nbsp; <kbd>←</kbd> prev &nbsp;·&nbsp; <kbd>1</kbd> missed &nbsp;·&nbsp; <kbd>2</kbd> got it
  </div>
</div>

<script>
const C="Accounting",V="Valuation",MA="M&A",L="LBO",MK="Markets",QM="Quick Math",B="Behavioural";

const STUDY_LINKS={
  [C]:[
    {t:"Three Financial Statements (CFI)",u:"https://corporatefinanceinstitute.com/resources/accounting/three-financial-statements/"},
    {t:"IFRS Standards (IFRS Foundation)",u:"https://www.ifrs.org/issued-standards/list-of-standards/"},
    {t:"Financial Accounting (Khan Academy)",u:"https://www.khanacademy.org/economics-finance-domain/core-finance/accounting-and-financial-stateme"}
  ],
  [V]:[
    {t:"DCF Model Training (CFI)",u:"https://corporatefinanceinstitute.com/resources/valuation/dcf-model-training/"},
    {t:"WACC Formula & Calculation (CFI)",u:"https://corporatefinanceinstitute.com/resources/valuation/what-is-wacc-formula/"},
    {t:"Valuation Methods Overview (CFI)",u:"https://corporatefinanceinstitute.com/resources/valuation/valuation-methods/"}
  ],
  [MA]:[
    {t:"Mergers & Acquisitions Overview (CFI)",u:"https://corporatefinanceinstitute.com/resources/valuation/mergers-acquisitions-ma/"},
    {t:"Accretion/Dilution Analysis (CFI)",u:"https://corporatefinanceinstitute.com/resources/valuation/accretion-dilution/"},
    {t:"M&A Interview Questions (M&I)",u:"https://mergersandinquisitions.com/ma-interview-questions/"}
  ],
  [L]:[
    {t:"LBO Model Tutorial (CFI)",u:"https://corporatefinanceinstitute.com/resources/valuation/lbo-model/"},
    {t:"Leveraged Buyout Explained (Investopedia)",u:"https://www.investopedia.com/terms/l/leveragedbuyout.asp"},
    {t:"LBO Interview Questions (WSO)",u:"https://www.wallstreetoasis.com/resources/interviews/lbo-modeling-interview-questions"}
  ],
  [MK]:[
    {t:"Fixed Income Basics (Investopedia)",u:"https://www.investopedia.com/terms/f/fixedincome.asp"},
    {t:"Macroeconomics (Khan Academy)",u:"https://www.khanacademy.org/economics-finance-domain/macroeconomics"},
    {t:"Capital Markets Overview (CFI)",u:"https://corporatefinanceinstitute.com/resources/career-map/sell-side/capital-markets/capital-markets/"}
  ],
  [QM]:[
    {t:"Mental Math for Finance (WSO)",u:"https://www.wallstreetoasis.com/resources/skills/finance/mental-math"},
    {t:"Financial Modelling Fundamentals (CFI)",u:"https://corporatefinanceinstitute.com/resources/excel/financial-modeling/"},
    {t:"IB Brain Teasers (M&I)",u:"https://mergersandinquisitions.com/investment-banking-math/"}
  ],
  [B]:[
    {t:"IB Interview Q&A Guide (M&I)",u:"https://mergersandinquisitions.com/investment-banking-interview-questions-and-answers/"},
    {t:"Fit Questions (WSO)",u:"https://www.wallstreetoasis.com/resources/interviews/investment-banking-interview-questions"},
    {t:"Tell Me About Yourself (M&I)",u:"https://mergersandinquisitions.com/tell-me-about-yourself/"}
  ]
};

const CARDS=[
// ── ACCOUNTING (40) ──────────────────────────────────────────────────────────
{cat:C,q:"Walk me through the three financial statements and how they link.",a:"<strong>Income Statement:</strong> Revenue − COGS = Gross Profit → − OpEx → EBIT → − Interest → EBT → − Tax = Net Income. Covers a period.<br><br><strong>Balance Sheet:</strong> Assets = Liabilities + Equity at a point in time.<br><br><strong>Cash Flow Statement:</strong> Operating + Investing + Financing = change in cash.<br><br><strong>Links:</strong> Net Income → Retained Earnings. D&amp;A add-back on CFS. Capex reduces cash, increases PP&amp;E. Debt raises cash and liabilities simultaneously."},
{cat:C,q:"$10 increase in depreciation — walk through all three statements (40% tax rate).",a:"<strong>IS:</strong> EBIT ↓ $10 → Net Income ↓ $6.<br><br><strong>CFS:</strong> Net Income ↓ $6, but D&amp;A non-cash add-back +$10 → operating CF <em>up</em> +$4.<br><br><strong>BS:</strong> PP&amp;E ↓ $10; Cash ↑ $4; Retained Earnings ↓ $6. Net asset change ↓ $6; equity ↓ $6 — balanced."},
{cat:C,q:"Inventory increases by $20 — how does that flow through the statements?",a:"<strong>BS:</strong> Inventory ↑ $20; Cash ↓ $20 (cash purchase) or AP ↑ $20 (credit).<br><br><strong>CFS:</strong> Inventory increase = use of cash → operating CF ↓ $20 (or offset by AP change).<br><br><strong>IS:</strong> No impact until inventory is sold — then it becomes COGS."},
{cat:C,q:"What is working capital and how does an increase affect cash flow?",a:"<strong>WC = Current Assets − Current Liabilities</strong> (excl. cash and short-term debt).<br><br>An increase in WC is a use of cash — AR grows or inventory builds. Appears as a negative adjustment in operating CF. A WC decrease (e.g. faster collections) generates cash."},
{cat:C,q:"Can a company be profitable but have negative operating cash flow?",a:"Yes. If revenue is recognised before cash is collected (high AR days) or inventory is building rapidly, cash lags profit.<br><br>Example: a B2B SaaS company books $10M revenue on 90-day payment terms — GAAP profit exists but operating CF is negative. This is why FCF is scrutinised alongside earnings."},
{cat:C,q:"What is the difference between EBIT and EBITDA?",a:"<strong>EBIT</strong> = Revenue − COGS − OpEx (operating profit).<br><strong>EBITDA</strong> = EBIT + D&amp;A — adds back non-cash charges to approximate operating cash generation before capex policy.<br><br>EBITDA is capital-structure and capex-neutral. Standard for cross-company comparison and leverage ratios. Not a GAAP/IFRS metric."},
{cat:C,q:"What is the difference between cash and accrual accounting?",a:"<strong>Cash:</strong> Revenue/expenses recorded when cash changes hands.<br><strong>Accrual:</strong> Revenue recognised when earned; expenses matched to the period they relate to.<br><br>GAAP and IFRS require accrual. Accrual better reflects economic reality. The gap between accrual profit and operating CF is where analysts look for red flags."},
{cat:C,q:"What is goodwill and when does it arise?",a:"<strong>Goodwill = Purchase Price − Fair Value of Net Identifiable Assets Acquired.</strong><br><br>Arises in acquisitions — represents unidentifiable intangibles: brand, workforce, synergies. Under IFRS and US GAAP: not amortised, tested annually for impairment. An impairment write-down hits the P&amp;L and signals deal overpayment."},
{cat:C,q:"What is the difference between accounts receivable and deferred revenue?",a:"<strong>AR:</strong> Service delivered, invoice sent, cash not yet received — an asset (you are owed cash).<br><br><strong>Deferred Revenue:</strong> Cash received, service not yet delivered — a liability (you owe the service). Once delivered, deferred revenue is recognised as revenue on the P&amp;L. SaaS companies often carry large deferred revenue balances."},
{cat:C,q:"How does IFRS 16 change lease accounting?",a:"Under IFRS 16 (effective 2019), most leases are capitalised. Lessee records a <strong>right-of-use (ROU) asset</strong> and a <strong>lease liability</strong>. Lease payments split into interest (IS) and principal repayment (CFS financing).<br><br>Impact: EBITDA increases (rent removed, replaced by D&amp;A + interest); leverage ratios rise; operating CF improves."},
{cat:C,q:"What are deferred tax assets and liabilities?",a:"<strong>DTA:</strong> Tax paid exceeds P&amp;L tax expense — a future benefit (e.g. tax loss carryforwards). An asset.<br><br><strong>DTL:</strong> P&amp;L tax expense is less than tax actually owed — you'll pay more later (e.g. accelerated tax depreciation). A liability."},
{cat:C,q:"A company buys $100M of equipment for cash. Walk through all three statements.",a:"<strong>CFS:</strong> Cash ↓ $100M (investing outflow — capex).<br><strong>BS:</strong> Cash ↓ $100M; PP&amp;E ↑ $100M. Total assets unchanged. Equity unchanged.<br><strong>IS:</strong> No immediate impact — depreciation will hit the IS over the asset's useful life."},
{cat:C,q:"LIFO vs FIFO — which is permitted under IFRS?",a:"<strong>FIFO:</strong> Oldest inventory sold first. In inflation: lower COGS → higher gross profit → higher taxes. Ending inventory at recent prices.<br><strong>LIFO:</strong> Most recent inventory sold first. Higher COGS in inflation → lower taxes.<br><br><strong>LIFO is not permitted under IFRS</strong> — only under US GAAP (used for the tax benefit)."},
{cat:C,q:"What is operating leverage and why does it matter?",a:"The sensitivity of EBIT to revenue changes, driven by fixed vs variable cost mix.<br><br><strong>High operating leverage</strong> (high fixed costs): a 10% revenue rise may produce 25% EBIT growth — magnifies both gains and losses. Airlines, manufacturing, and software are high operating leverage businesses.<br><br>DoL = % change in EBIT / % change in Revenue."},
{cat:C,q:"What is the difference between book value and market value of equity?",a:"<strong>Book value:</strong> Balance sheet equity — cumulative historical net assets minus liabilities. Often far below economic reality for asset-light businesses.<br><strong>Market value:</strong> Share price × diluted shares. Reflects forward earnings expectations.<br><br>For most healthy businesses, market value >> book value (P/B > 1)."},
{cat:C,q:"What does IFRS 15 say about revenue recognition?",a:"Revenue recognised when (or as) a company <strong>satisfies a performance obligation</strong> by transferring control to a customer.<br><br><strong>5-step model:</strong> (1) identify contract; (2) identify performance obligations; (3) determine transaction price; (4) allocate price; (5) recognise when obligation is satisfied."},
{cat:C,q:"What happens to the balance sheet when a company issues $50M of new equity?",a:"<strong>Assets:</strong> Cash ↑ $50M.<br><strong>Equity:</strong> Share capital + APIC ↑ $50M.<br><br>BS stays balanced. No IS impact. CFS: +$50M financing inflow."},
{cat:C,q:"What happens to the balance sheet when a company borrows $50M?",a:"<strong>Assets:</strong> Cash ↑ $50M.<br><strong>Liabilities:</strong> Debt ↑ $50M.<br><br>Total assets and total liabilities both rise $50M. No equity or IS impact. CFS: +$50M financing inflow."},
{cat:C,q:"How do share buybacks affect the financial statements?",a:"<strong>BS:</strong> Cash ↓; Treasury stock (contra-equity) ↑ → equity decreases.<br><strong>IS:</strong> No direct impact, but EPS rises as share count falls.<br><strong>CFS:</strong> Buyback = financing outflow."},
{cat:C,q:"What is normalised EBITDA?",a:"EBITDA adjusted for one-time, non-recurring items: restructuring charges, M&amp;A transaction costs, litigation settlements, impairments, gains/losses on asset sales.<br><br>Goal: 'run-rate' earnings power. Standard in M&amp;A due diligence — buyers and sellers negotiate the normalised EBITDA figure because it directly determines acquisition price."},
{cat:C,q:"What is net debt?",a:"<strong>Net Debt = Gross Debt − Cash &amp; Equivalents.</strong><br><br>Used in EV calculations (EV = Equity Value + Net Debt) and leverage ratios (Net Debt / EBITDA). Net cash = negative net debt. Cash excluded because it could theoretically be used to repay debt."},
{cat:C,q:"How does paying a $20M dividend affect the three statements?",a:"<strong>CFS:</strong> Cash ↓ $20M (financing outflow).<br><strong>BS:</strong> Cash ↓ $20M; Retained Earnings ↓ $20M → equity falls.<br><strong>IS:</strong> No impact — dividends are distributions of profit, not an expense. Classic trick question."},
{cat:C,q:"What is unlevered free cash flow and how do you calculate it?",a:"<strong>Unlevered FCF = EBIT × (1−t) + D&amp;A − ΔWC − Capex</strong><br><br>= NOPAT + D&amp;A − ΔWC − Capex.<br><br>'Unlevered' = before interest effects. Represents cash available to all capital providers (debt + equity). Used in DCF models discounted at WACC."},
{cat:C,q:"What is the difference between capex and opex?",a:"<strong>Capex:</strong> Spending on long-lived assets. Capitalised on BS; depreciated over time. Appears in CFS investing activities.<br><br><strong>Opex:</strong> Expensed immediately on P&amp;L (salaries, rent, marketing).<br><br>The capitalise-vs-expense decision matters: capitalising opex flatters current earnings at the cost of future D&amp;A."},
{cat:C,q:"What is the interest coverage ratio?",a:"<strong>Interest Coverage = EBIT / Interest Expense</strong> (or EBITDA / Interest for a looser measure).<br><br>Measures ability to service debt from operations. Lenders require 2.5x+ as a covenant. Below 1.5x = stressed. Below 1.0x = company cannot cover interest from operations."},
{cat:C,q:"What is DSO and what does a rising figure signal?",a:"<strong>DSO = (AR / Revenue) × 365.</strong> Average time to collect payment after a sale.<br><br>Rising DSO signals: customers taking longer to pay (credit risk), aggressive revenue recognition, or deteriorating cash conversion. Compare to industry norms and company history."},
{cat:C,q:"What is the effective tax rate vs the statutory rate?",a:"<strong>Statutory:</strong> Legislated corporate tax rate (30% in Australia).<br><strong>Effective = Income Tax Expense / Pre-tax Income.</strong><br><br>Differ due to: tax credits, R&amp;D incentives, non-deductible expenses, jurisdictional differences for multinationals."},
{cat:C,q:"What is purchase price allocation (PPA)?",a:"After an acquisition, purchase price allocated to fair values of identifiable assets/liabilities, including intangibles not on target's books (customer lists, brand, technology). Residual = goodwill.<br><br>PPA intangibles create additional D&amp;A charges post-deal that depress reported EPS — why analysts focus on 'cash earnings' post-acquisition."},
{cat:C,q:"What are contingent liabilities and when are they recognised?",a:"Under IFRS (IAS 37), a provision is recognised when: (1) present obligation exists; (2) probable (&gt;50%) outflow; (3) reliably estimated. Otherwise notes disclosure only.<br><br>US GAAP: 'probable and reasonably estimable.' Examples: litigation, warranties, restructuring."},
{cat:C,q:"What is the difference between direct and indirect CFS methods?",a:"Both produce the same operating CF figure.<br><br><strong>Direct:</strong> Lists actual cash receipts and payments (rare).<br><strong>Indirect:</strong> Net income → add back non-cash charges (D&amp;A) → adjust for WC changes.<br><br>Most companies use indirect. Almost universally tested in IB interviews."},
{cat:C,q:"What is ROE and what drives it per DuPont?",a:"<strong>ROE = Net Income / Equity.</strong><br><br>DuPont: ROE = Profit Margin × Asset Turnover × Financial Leverage<br>= (NI/Revenue) × (Revenue/Assets) × (Assets/Equity).<br><br>A company can improve ROE via: higher margins, more efficient asset use, or more leverage. Leverage-driven ROE is riskier."},
{cat:C,q:"What is EBITDA margin and why is it used?",a:"<strong>EBITDA Margin = EBITDA / Revenue.</strong><br><br>Measures operating profitability as % of revenue. Capital-structure and capex-neutral — standard for cross-company comparison. Widening margin = pricing power or cost efficiency. Contracting = competitive pressure or cost inflation."},
{cat:C,q:"How does an asset write-down affect the three statements?",a:"<strong>IS:</strong> Impairment charge → pre-tax income falls → net income falls.<br><strong>BS:</strong> Asset value reduced; retained earnings fall.<br><strong>CFS:</strong> Non-cash charge → added back in operating activities (same mechanic as D&amp;A). No cash impact."},
{cat:C,q:"What is the cash conversion cycle (CCC)?",a:"<strong>CCC = DSO + DIO − DPO</strong><br>(Days Sales Outstanding + Days Inventory Outstanding − Days Payable Outstanding).<br><br>Measures days cash is tied up in operations. Lower = better. Negative CCC (Amazon, Walmart) = collect from customers before paying suppliers — a structural cash flow advantage."},
{cat:C,q:"What is ROIC and why is it better than ROE?",a:"<strong>ROIC = NOPAT / Invested Capital</strong> (IC = equity + net debt).<br><br>Measures how efficiently all capital generates returns. Unlike ROE, not distorted by leverage.<br><br><strong>ROIC > WACC = value creation. ROIC < WACC = value destruction</strong> regardless of reported profit."},
{cat:C,q:"What is the difference between a provision and a contingent liability?",a:"<strong>Provision:</strong> On the balance sheet — obligation is probable and measurable (warranty, restructuring).<br><br><strong>Contingent liability:</strong> Notes only — obligation is possible but not probable, or amount can't be reliably estimated (uncertain litigation outcome)."},
{cat:C,q:"What is shareholders' equity and its components?",a:"<strong>Share capital:</strong> Par value of shares issued.<br><strong>APIC:</strong> Premium above par on issuance.<br><strong>Retained earnings:</strong> Cumulative net income minus dividends.<br><strong>Treasury stock:</strong> Buybacks (contra-equity, shown as negative).<br><strong>OCI:</strong> Unrealised FX translation, pension adjustments, hedging reserves."},
{cat:C,q:"What is the difference between gross debt and net debt?",a:"<strong>Gross debt:</strong> All interest-bearing borrowings on the balance sheet.<br><strong>Net debt = Gross Debt − Cash.</strong><br><br>Use gross for: covenant calculations, refinancing risk assessment. Use net for: EV bridge, leverage ratios in valuation — cash could theoretically repay debt."},
{cat:C,q:"What is financial leverage and how does it affect ROE vs ROIC?",a:"Financial leverage amplifies ROE because equity is smaller relative to assets. But ROIC is unaffected by leverage — it measures returns on all capital.<br><br>A company with 80% debt and 10% ROIC will show high ROE but has thin safety margin. ROIC is the purer measure of underlying business quality."},
{cat:C,q:"What are the components of free cash flow and why does it matter more than net income?",a:"<strong>Levered FCF = Net Income + D&amp;A − ΔWC − Capex ± debt changes.</strong><br><br>FCF matters more because: (1) it captures actual cash generation after sustaining the business; (2) it cannot be manipulated by accrual accounting choices; (3) it drives dividends, buybacks, and debt repayment. Companies can report profits while bleeding cash."},
{cat:C,q:"What is the difference between EBITDA and operating cash flow?",a:"EBITDA = EBIT + D&amp;A — ignores working capital changes, taxes, and some cash items.<br><br><strong>Operating CF</strong> starts with net income and adjusts for all non-cash items and WC changes — a GAAP metric and more representative of actual cash generation.<br><br>EBITDA overstates cash flow when capex is high or WC is growing rapidly."},
// ── VALUATION (40) ───────────────────────────────────────────────────────────
{cat:V,q:"What are the three primary valuation methodologies and when is each most appropriate?",a:"<strong>DCF:</strong> Intrinsic value based on projected cash flows. Best for: stable long-horizon cash flows, private companies, dislocated public markets.<br><strong>Trading Comps:</strong> Market-based current valuation via multiples. Best for: current market read, public peers.<br><strong>Precedent Transactions:</strong> What acquirers have paid. Best for: M&amp;A fairness opinions — includes control premium.<br><br>Always triangulate across all three."},
{cat:V,q:"Walk me through a DCF step by step.",a:"<strong>1.</strong> Project unlevered FCF for 5–10 years: EBIT(1−t) + D&amp;A − ΔWC − Capex.<br><strong>2.</strong> Calculate Terminal Value: Gordon Growth [FCF(1+g)/(WACC−g)] or Exit Multiple [EBITDA × EV/EBITDA].<br><strong>3.</strong> Discount all FCFs and TV to PV at WACC.<br><strong>4.</strong> Sum = Enterprise Value.<br><strong>5.</strong> Bridge: EV − Net Debt − Preferred − Minorities = Equity Value.<br><strong>6.</strong> ÷ diluted shares = implied share price."},
{cat:V,q:"How do you calculate WACC?",a:"<strong>WACC = (E/V) × Ke + (D/V) × Kd × (1−t)</strong><br><br>E = equity market cap, D = market value of debt, V = E+D.<br>Ke = CAPM: Rf + β × ERP.<br>Kd = pre-tax cost of debt (YTM on existing debt).<br>t = marginal tax rate.<br><br>Use market values, not book values, for weights."},
{cat:V,q:"What is CAPM and what are its limitations?",a:"<strong>Ke = Rf + β × ERP.</strong> Assumes investors hold diversified portfolios and only price systematic (market) risk.<br><br><strong>Limitations:</strong> Single-factor model (ignores size, value, momentum premia); beta is backward-looking and unstable; assumes normal return distribution; ERP is estimated not observed; weak empirical support for beta predicting actual returns."},
{cat:V,q:"How do you find beta for a private company?",a:"(1) Find public comparable companies.<br>(2) Unlever each comp's beta: <strong>βU = βL / [1 + (1−t)(D/E)]</strong><br>(3) Take median unlevered beta.<br>(4) Re-lever at target's capital structure: <strong>βL = βU × [1 + (1−t)(D/E)]</strong><br><br>This is the Hamada equation."},
{cat:V,q:"What is the difference between Enterprise Value and Equity Value?",a:"<strong>EV = Equity Value + Net Debt + Preferred + Minority Interest.</strong><br><br>EV = value to ALL capital providers. Equity Value = value to shareholders only.<br><br>Use EV multiples (EV/EBITDA) with operating metrics. Use equity multiples (P/E) for per-share metrics. Mixing the two is a classic interview error."},
{cat:V,q:"Why do we add minority interest to Enterprise Value?",a:"Consolidated P&amp;L includes 100% of a partially-owned subsidiary's EBITDA even if the parent owns, say, 80%. For EV/EBITDA to be consistent, EV must include the minority's 20% claim — so minority interest (BS liability) is added to EV."},
{cat:V,q:"What is terminal value and what % of DCF does it typically represent?",a:"TV = PV of all cash flows beyond the forecast period. Typically <strong>60–80%+ of total DCF value.</strong><br><br>(1) <strong>Gordon Growth:</strong> FCF(1+g)/(WACC−g); (2) <strong>Exit Multiple:</strong> terminal EBITDA × EV/EBITDA.<br><br>TV dominates the valuation — always run a WACC/growth sensitivity table."},
{cat:V,q:"What is a reasonable terminal growth rate in a DCF?",a:"Typically <strong>2–3%</strong> for developed-market businesses — roughly long-run nominal GDP growth. Above this implies the company eventually grows larger than the entire economy (logically inconsistent). Must be less than WACC or the Gordon Growth formula breaks (value → infinity)."},
{cat:V,q:"Why do precedent transactions trade at a premium to trading comps?",a:"Precedents include a <strong>control premium</strong> (typically 20–40%) — an acquirer must offer more than market price to convince shareholders to sell. Precedents also capture synergies priced into the deal and reflect M&amp;A market conditions at announcement. For a company being sold, precedents set the floor expectation."},
{cat:V,q:"What multiples are used across different sectors?",a:"<strong>Industrials/TMT:</strong> EV/EBITDA, EV/EBIT, P/E.<br><strong>High-growth/capital-light:</strong> EV/Revenue, EV/Gross Profit.<br><strong>Banks:</strong> P/E, P/Book (EV not meaningful — debt is funding, not capital).<br><strong>Resources:</strong> EV/EBITDA, EV/Production, P/NAV.<br><strong>Real estate:</strong> P/FFO, cap rates."},
{cat:V,q:"How do you value a company with negative EBITDA?",a:"Use <strong>EV/Revenue</strong> or EV/Gross Profit if comparable peers exist. For pre-revenue/early stage: probability-weighted scenario DCF, VC method (expected exit × ownership × discount), or operational KPIs (EV/DAU, EV/MAU).<br><br>Be explicit about the path to profitability and key assumptions."},
{cat:V,q:"What is a football field valuation chart?",a:"A horizontal bar chart in pitchbooks showing implied valuation range from each methodology (DCF, trading comps, precedents, LBO floor, 52-week range).<br><br>Helps clients see where valuations converge or diverge and anchor on a negotiating range. Wide bars = high uncertainty. Narrow overlap = clearer value anchor."},
{cat:V,q:"What is a sum-of-the-parts (SOTP) valuation?",a:"Used for conglomerates where different segments warrant different multiples. Value each segment separately, sum them, subtract corporate overhead costs (capitalised at an appropriate multiple).<br><br>Often reveals a 'conglomerate discount' — the market values the whole at less than the sum of parts, implying value from a breakup or spin-off."},
{cat:V,q:"What is the Gordon Growth Model and when does it fail?",a:"<strong>Value = CF₁ / (r − g).</strong> Used for terminal value in DCFs and dividend discount models.<br><br><strong>Fails when:</strong> g ≥ r (value → infinity — a modelling error). Also assumes constant perpetual growth — inappropriate for cyclical businesses. Always use normalised long-run FCF as the base."},
{cat:V,q:"How does leverage affect WACC?",a:"Debt is cheaper than equity (tax shield). Adding leverage initially lowers WACC. But beyond an optimal point, increased financial risk raises both Kd (wider credit spreads) and Ke (equity holders demand more).<br><br>Modigliani-Miller with taxes implies optimal leverage — in practice, balance tax shield vs distress and agency costs."},
{cat:V,q:"What does a high EV/EBITDA multiple imply about a business?",a:"The market pays more per dollar of EBITDA. Implies: (1) high growth expectations; (2) strong competitive moat; (3) capital-light model with high FCF conversion; (4) scarcity or strategic premium; (5) low-rate environment compressing discount rates.<br><br>Contextualise against sector peers and growth rate."},
{cat:V,q:"What is the difference between LTM and forward multiples?",a:"<strong>LTM (Last Twelve Months):</strong> Based on actual reported results. Reliable, audited — no forecast error.<br><strong>NTM/Forward:</strong> Based on analyst consensus estimates. More relevant (buying future earnings) but subject to forecast risk.<br><br>Forward multiples are lower than LTM when growth is expected — a natural relationship in bull markets."},
{cat:V,q:"What is the equity value bridge from Enterprise Value?",a:"<strong>Equity Value = EV − Total Debt + Cash − Preferred − Minorities + Non-operating Assets.</strong><br><br>Each item is a claim senior to equity or an asset not captured in operating metrics. In real transactions, missed items (unfunded pensions, earn-outs, operating lease liabilities) can move equity value materially."},
{cat:V,q:"What is a sensitivity table in a DCF?",a:"A two-variable data table showing how implied valuation changes across assumptions — typically <strong>WACC vs terminal growth rate</strong> or WACC vs exit multiple.<br><br>Prevents false precision. Every DCF in a pitchbook includes one. Run at minimum a 3×3 grid."},
{cat:V,q:"Why is EV/Revenue a less reliable multiple than EV/EBITDA?",a:"EV/Revenue ignores cost structure entirely. Two companies at 5x revenue can have radically different economics: one at 40% EBITDA margin, one at 5%.<br><br>Revenue multiples are useful only when EBITDA is negative, highly distorted, or when comparing very early-stage businesses."},
{cat:V,q:"How do stock options and warrants affect equity valuation?",a:"They represent potential dilution. Use the <strong>treasury stock method:</strong><br><br>(1) Assume options exercised; proceeds used to repurchase shares at current market price.<br>(2) Net dilutive shares = options exercised − shares repurchased.<br>(3) Add to basic share count for fully diluted shares.<br><br>Only in-the-money options create dilution."},
{cat:V,q:"What is the LBO floor in a sale process?",a:"The price at which a PE buyer can acquire a company and still achieve target returns (~20%+ IRR). In competitive processes, the LBO floor sets a minimum price — strategic buyers must pay above it to win. Bankers use the LBO model to show clients what PE will bid."},
{cat:V,q:"What is NAV and when is it used?",a:"<strong>NAV = Fair Value of Assets − Liabilities.</strong><br><br>Used for asset-heavy businesses: mining, oil &amp; gas, real estate, infrastructure. NAV is forward-looking — uses risked reserves or projected asset cash flows discounted at a risk-adjusted rate."},
{cat:V,q:"What is the P/E ratio and what are its limitations?",a:"<strong>P/E = Market Cap / Net Income.</strong> Simple and widely used. Limitations: (1) meaningless if earnings are negative; (2) affected by capital structure (interest) and tax policy; (3) easily manipulated by accrual accounting; (4) ignores capex intensity and FCF conversion.<br><br>Prefer EV-based multiples for cross-company comparison."},
{cat:V,q:"How does a rising rate environment affect DCF valuations?",a:"Rising rates increase WACC (higher Rf → higher Ke via CAPM; higher Kd). Higher WACC compresses the PV of all future cash flows.<br><br>Long-duration assets (growth stocks, infrastructure) are hit hardest. A 100bps WACC increase can compress DCF equity value by 15–25%+ for a high-multiple business. This drove the 2022 equity market decline."},
{cat:V,q:"What is a control premium and why does it exist?",a:"The % above market price an acquirer pays for a controlling stake. Typically <strong>20–40%.</strong><br><br>Exists because: (1) shareholders compensated for giving up liquidity/optionality; (2) acquirer captures synergies; (3) controlling the business enables value-creating strategic decisions not available to minority holders."},
{cat:V,q:"When would you prefer EV/EBIT over EV/EBITDA?",a:"EV/EBIT deducts D&amp;A — captures the economic cost of capital consumption. For capex-intensive businesses, two companies with identical EBITDA but different capex needs will look different on EV/EBIT but identical on EV/EBITDA.<br><br>Prefer EV/EBIT for: industrials, manufacturing, infrastructure."},
{cat:V,q:"What is the PEG ratio?",a:"<strong>PEG = P/E / Earnings Growth Rate.</strong> Adjusts P/E for growth — a 30x P/E growing at 30% has PEG = 1 (same as 15x growing 15%). PEG &lt; 1 traditionally considered cheap.<br><br>Limitation: growth rate selection is subjective; ignores risk, FCF conversion, balance sheet quality."},
{cat:V,q:"What drives the difference between DCF value and trading comp value for the same company?",a:"DCF = intrinsic value based on your specific assumptions. Comps = current market sentiment.<br><br>They diverge when: market under/overvalues the sector; your growth/margin assumptions differ from consensus; subject company has idiosyncratic characteristics; macro conditions are at extremes.<br><br>The divergence is analytically interesting — explain it, don't average over it."},
{cat:V,q:"What is the difference between EV/EBITDA and EV/FCF? When would you use each?",a:"<strong>EV/EBITDA:</strong> Ignores capex, WC changes, and taxes. Good for quick comparison but overstates cash generation for capex-heavy businesses.<br><br><strong>EV/FCF:</strong> Captures actual cash generation after all reinvestment. Better for assessing true economic value. Preferred for mature, stable businesses where capex policy varies significantly across peers."},
{cat:V,q:"What is a dividend discount model (DDM)?",a:"Values a company by discounting expected future dividends at the cost of equity: <strong>Value = D₁ / (Ke − g).</strong><br><br>Most useful for: mature dividend-paying companies (utilities, banks, REITs) where dividends are the primary return mechanism. Breaks down for growth companies that reinvest all earnings and pay no dividend."},
// ── M&A (25) ─────────────────────────────────────────────────────────────────
{cat:MA,q:"What are the main strategic rationales for M&A?",a:"<strong>Revenue synergies:</strong> Cross-sell, new geographies, new products.<br><strong>Cost synergies:</strong> Headcount, procurement, facilities, back-office.<br><strong>Capability acquisition:</strong> Technology, IP, talent.<br><strong>Market consolidation:</strong> Pricing power, eliminate competitor.<br><strong>Vertical integration:</strong> Own supply chain or distribution.<br><br>Empirically: most acquisitions destroy acquirer value — synergies are systematically overestimated."},
{cat:MA,q:"Walk me through an accretion/dilution analysis.",a:"Compare acquirer's <strong>standalone EPS</strong> vs <strong>pro-forma EPS</strong> post-deal.<br><br>(1) Identify consideration mix (cash/stock/debt).<br>(2) Calculate financing cost: debt = interest × (1−t); stock = shares issued × Ke.<br>(3) Add target's net income + after-tax synergies.<br>(4) Subtract incremental D&amp;A on acquired intangibles.<br>(5) ÷ new pro-forma share count.<br><br>Pro-forma EPS &gt; standalone → accretive."},
{cat:MA,q:"What makes a deal accretive vs dilutive?",a:"Key driver: <strong>target's earnings yield vs cost of consideration.</strong><br><br>Stock deal: if target P/E &lt; acquirer P/E → target's earnings yield &gt; Ke → accretive.<br>Debt deal: if target's earnings yield &gt; after-tax cost of debt → accretive.<br><br>A dilutive deal can still create long-term value if strategic rationale justifies the near-term EPS cost."},
{cat:MA,q:"Cash vs stock consideration — when does each make sense?",a:"<strong>Cash:</strong> No dilution; immediate certainty for sellers; signals confidence; depletes balance sheet; may require leverage.<br><strong>Stock:</strong> Preserves cash; sellers share risk/upside; useful if acquirer stock is overvalued; requires registration; complex tax treatment for sellers.<br><br>Decision turns on relative valuations, leverage capacity, and seller preference."},
{cat:MA,q:"What are typical deal protection mechanisms in M&A agreements?",a:"<strong>Break-up fee:</strong> ~2–4% of deal value; paid by target if it walks for a superior offer.<br><strong>Reverse break-up fee:</strong> Paid by buyer if deal fails (financing, regulatory block).<br><strong>MAC clause:</strong> Buyer right to exit on material adverse change.<br><strong>No-shop:</strong> Target can't solicit other bids post-signing.<br><strong>Go-shop:</strong> Target allowed to solicit for a limited period."},
{cat:MA,q:"What is a fairness opinion?",a:"Written opinion from a financial adviser that transaction consideration is fair, from a financial point of view, to target shareholders. Required by boards for fiduciary protection. Based on full valuation work (DCF, comps, precedents).<br><br>Conflict of interest: the advising bank's fee is often completion-contingent."},
{cat:MA,q:"Walk me through a typical sell-side M&A process.",a:"<strong>1. Mandate:</strong> Engage adviser, prepare CIM and teaser, sign NDAs.<br><strong>2. Phase I:</strong> Contact buyers, share teaser, receive IOIs, select shortlist.<br><strong>3. Phase II:</strong> Management presentations, data room, receive binding bids.<br><strong>4. Exclusivity &amp; DD:</strong> Preferred buyer, confirmatory due diligence.<br><strong>5. Signing:</strong> SPA negotiated and executed.<br><strong>6. Closing:</strong> Regulatory approvals, shareholder vote, fund."},
{cat:MA,q:"What is a dual-track process?",a:"Running an <strong>IPO and M&amp;A sale simultaneously.</strong> Management prepares for both; best outcome (higher value) determines the route. The IPO threat creates urgency among bidders.<br><br>Common for PE exits near portfolio company maturity. Requires significant management bandwidth and dual legal/fee commitments."},
{cat:MA,q:"What is a hostile takeover and what defences exist?",a:"A bid made directly to shareholders without target board support.<br><br><strong>Defences:</strong> Poison pill (dilutes hostile bidder's stake); staggered board; white knight (invite friendly acquirer); pac-man defence (counter-bid); golden parachutes.<br><br>In Australia, Corporations Act s606 restricts creep above 20% voting power."},
{cat:MA,q:"What is the difference between an asset deal and a stock deal?",a:"<strong>Asset deal:</strong> Buyer acquires specific assets. Tax step-up in basis → more future D&amp;A. Avoids unknown liabilities. Preferred by buyers.<br><strong>Stock deal:</strong> Buyer acquires the legal entity including all liabilities. Simpler contract/licence transfers. Preferred by sellers (capital gains treatment)."},
{cat:MA,q:"How is synergy value split between buyer and seller?",a:"In competitive auctions, most synergy value accrues to target shareholders — buyers 'pay away' synergies in the premium.<br><br>Strategic buyers pay away ~50–75% of synergy value. PE buyers (no synergies) rely on standalone improvement. Less competition for the asset → buyer retains more synergy value."},
{cat:MA,q:"What is an earnout and when is it used?",a:"Contingent consideration: seller receives additional payment if business hits agreed post-close targets (e.g. EBITDA &gt; $X in year 2). Bridges valuation gaps when buyer/seller disagree on future performance.<br><br>Risk for sellers: buyer controls the business post-close and can influence whether targets are met."},
{cat:MA,q:"What regulatory approvals might a large Australian deal require?",a:"<strong>ACCC:</strong> Competition review — substantial lessening of competition.<br><strong>FIRB:</strong> Foreign Investment Review Board — foreign acquisitions above sector thresholds.<br><strong>APRA:</strong> Financial sector acquisitions.<br><strong>ASX Listing Rules:</strong> Shareholder approval if issuing &gt;10% of acquirer's shares or related-party transactions."},
{cat:MA,q:"What is a management buyout (MBO)?",a:"An LBO where the existing <strong>management team</strong> acquires a significant equity stake alongside a PE sponsor. Common in corporate carve-outs — management knows the business better than outside buyers.<br><br>Management rolls equity, gains significant upside, and is highly incentivised. PE provides most capital and financial engineering."},
{cat:MA,q:"What does rolling equity mean in a PE transaction?",a:"A seller retains a portion of their equity — instead of cashing out fully, they convert shares into equity in the new PE-owned structure. Common for management (aligns incentives post-deal). The PE firm pays a lower cash amount; rolled equity participates in the next exit."},
{cat:MA,q:"What is the difference between EV paid and equity consideration in a deal?",a:"<strong>Equity consideration = price per share × shares acquired.</strong><br><strong>EV paid = equity consideration + assumed debt − cash acquired.</strong><br><br>Example: $10/share × 100M shares = $1B equity. Target has $200M net debt → EV paid = $1.2B. EV/EBITDA multiple is based on EV paid, not just the equity check."},
{cat:MA,q:"What is a carve-out and why is it complex?",a:"Separates a subsidiary from the parent — via sale or partial IPO. Complex because: (1) shared services/infrastructure must be untangled; (2) standalone cost structures estimated ('dis-synergies'); (3) intercompany transactions re-priced at arm's length; (4) carve-out entity may lack its own credit history and contracts."},
{cat:MA,q:"What is Corporations Act s606 and why does it matter for Australian M&A?",a:"Section 606 prohibits acquiring <strong>voting power above 20%</strong> in an ASX-listed company (or increasing above 20%) except via: a formal takeover bid, shareholder-approved placement, or creep acquisition (3% per 6 months).<br><br>The 20% threshold is a critical structural feature of Australian M&amp;A."},
{cat:MA,q:"What is purchase price allocation and why does it affect post-deal EPS?",a:"After closing, purchase price allocated to fair values of identifiable assets/liabilities including intangibles not on the target's books (customer lists, brand, technology). Residual = goodwill.<br><br>PPA intangibles generate additional D&amp;A charges post-deal → suppress reported EPS. Why acquirers highlight 'cash EPS' (adding back intangible amortisation)."},
{cat:MA,q:"What is a tender offer vs an open market purchase?",a:"<strong>Tender offer:</strong> Formal offer made directly to all shareholders at a specified premium. Must remain open a minimum period. Regulatory filings required. Used when speed and certainty of control are needed.<br><br><strong>Open market purchase:</strong> Buying shares on-exchange at market prices. Slower, limited to 20% without a formal offer under ASX rules."},
{cat:MA,q:"What is a staple financing in an M&A process?",a:"Financing offered by the <strong>sell-side banker</strong> (stapled to the auction) to potential PE buyers. The banker arranges a debt package alongside the sale that buyers can adopt or replace with their own.<br><br>Speeds up process, provides a financing floor — but creates a conflict of interest (sell-side bank also earns debt fees)."},
{cat:MA,q:"What is a SPAC and how does it differ from a traditional IPO?",a:"A <strong>Special Purpose Acquisition Company</strong> raises cash in an IPO with no underlying business — it's a 'blank cheque' vehicle. It then merges with a private target, taking it public without a traditional IPO process.<br><br>Benefits: faster, less regulatory burden, more price certainty for the target. Drawbacks: dilution from warrants, redemption risk, weaker diligence than traditional IPO."},
{cat:MA,q:"What are the main components of a Confidential Information Memorandum (CIM)?",a:"A CIM is the primary marketing document sent to potential buyers in a sale process. Typically includes: executive summary; investment highlights; business overview; industry and competitive landscape; financial performance (historical + projections); management team; transaction overview and process details.<br><br>Prepared by the sell-side bank. Teasers are shorter anonymised versions sent before NDAs."},
{cat:MA,q:"What is a data room in M&A?",a:"A secure (usually virtual) repository of due diligence materials made available to prospective buyers. Contains: financial statements, legal documents, contracts, IP, HR information, regulatory filings, customer/supplier agreements.<br><br>Access is carefully controlled and tracked. The sell-side bank manages the data room and Q&amp;A process. Completeness of the data room directly affects buyer confidence and bid quality."},
{cat:MA,q:"What does EBITDA to equity bridge mean in the context of a transaction?",a:"The bridge from EBITDA to equity value for the seller: EBITDA × EV/EBITDA multiple = EV → minus net debt, transaction costs, tax leakage, pension liabilities, working capital adjustments = <strong>equity value (the cheque the seller receives).</strong><br><br>Each adjustment is negotiated at close. Understanding this bridge is essential for any IB analyst working on a sale."},
// ── LBO (20) ─────────────────────────────────────────────────────────────────
{cat:L,q:"What are the key value creation drivers in an LBO?",a:"<strong>1. Debt paydown:</strong> FCF reduces debt; equity grows as EV stays constant.<br><strong>2. EBITDA growth:</strong> Organic growth, margin expansion, add-on acquisitions.<br><strong>3. Multiple expansion:</strong> Exit at higher EV/EBITDA than entry.<br><br>Best LBOs rely on #1 and #2. #3 is a bonus — never assume it. It's outside the sponsor's control."},
{cat:L,q:"What makes a good LBO candidate?",a:"<strong>Must-haves:</strong> Strong predictable FCF; low existing leverage; stable market position; clear improvement levers; multiple exit paths; experienced management.<br><br><strong>Nice-to-haves:</strong> Asset-light model (low ongoing capex); non-cyclical revenues; fragmented industry (roll-up opportunity); non-core to current owner (motivated seller)."},
{cat:L,q:"Walk me through a basic LBO model structure.",a:"<strong>Sources &amp; Uses:</strong> Acquisition price funded by PE equity + debt tranches.<br><strong>Operating model:</strong> Revenue → EBITDA → capex → WC → unlevered FCF.<br><strong>Debt schedule:</strong> Opening balances, annual interest, mandatory amortisation, cash sweep.<br><strong>Exit:</strong> Exit multiple × exit EBITDA → EV → equity proceeds.<br><strong>Returns:</strong> IRR and MoM on equity invested."},
{cat:L,q:"What is a typical PE fund's return target?",a:"Gross IRR: <strong>20–25%+.</strong> Net IRR to LPs after fees and carry: 15–20%.<br><br>MoM benchmarks: 2x in 4–5 years ≈ 15–20% IRR; 3x in 5 years ≈ 25% IRR; 3x in 3 years ≈ 44% IRR.<br><br>Holding period matters — 2x in 3 years is far better than 3x in 10 years."},
{cat:L,q:"Walk through a numerical example of how leverage amplifies equity returns.",a:"Buy $100M EV: $40M equity + $60M debt. Exit at $130M EV after 5 years, having paid down $20M debt.<br><br>Exit equity = $130M − $40M = <strong>$90M.</strong> MoM = $90/$40 = <strong>2.25x.</strong><br><br>Without leverage (all equity): exit $130M → MoM = 1.3x. Leverage converted a 30% EV gain into a 125% equity gain."},
{cat:L,q:"What are the main debt instruments in an LBO capital structure?",a:"<strong>Term Loan B (TLB):</strong> Largest tranche, floating rate, institutional, minimal amortisation, ~7yr maturity.<br><strong>RCF:</strong> Revolving credit for WC flexibility, usually undrawn.<br><strong>Senior secured notes:</strong> HY bonds, fixed rate, bullet maturity.<br><strong>Second lien / mezzanine:</strong> Subordinated, higher yield.<br><strong>PIK / toggle notes:</strong> Interest paid in kind, highest yield/risk."},
{cat:L,q:"What is the difference between maintenance and incurrence covenants?",a:"<strong>Maintenance:</strong> Tested quarterly — breach = immediate default. E.g. leverage ≤ 5x. Common in bank loans.<br><br><strong>Incurrence:</strong> Only triggered if borrower takes a specific action (more debt, dividend). Common in HY bonds. More borrower-friendly. PE sponsors prefer cov-lite structures for operational flexibility."},
{cat:L,q:"What is a dividend recapitalisation?",a:"Company raises new debt post-buyout; proceeds used to pay a <strong>special dividend</strong> to the PE sponsor — returning capital before exit. Crystallises partial return early.<br><br>Risk: increases leverage on the operating business. Can signal either strong FCF capacity, or the sponsor extracting cash when exit options are limited."},
{cat:L,q:"What is multiple arbitrage in a PE roll-up?",a:"If a platform trades at 10x EBITDA and acquires a smaller add-on at 6x, the acquired EBITDA is immediately valued at the platform's 10x — creating instant equity value. The 4x multiple gap = <strong>multiple arbitrage.</strong><br><br>Relies on the market continuing to value scale at a premium. Common in fragmented industries (healthcare services, business services)."},
{cat:L,q:"What are typical LBO exit routes and hold periods?",a:"Average hold: <strong>3–7 years.</strong><br><br><strong>Exit routes:</strong><br>(1) Strategic sale — most common, highest price (buyer pays synergies).<br>(2) Secondary sale — to another PE fund.<br>(3) IPO — capital markets dependent.<br>(4) Dividend recap — partial exit without selling."},
{cat:L,q:"What is the difference between IRR and money-on-money (MoM)?",a:"<strong>MoM = Exit Equity / Entry Equity.</strong> Time-agnostic — 3x in 3 years vs 3x in 8 years look identical.<br><br><strong>IRR</strong> accounts for time — annualised return. Use both together. High IRR with low MoM (quick flip) may not be as impressive as moderate IRR with high MoM over a longer hold."},
{cat:L,q:"What is a PIK toggle note?",a:"A high-yield bond giving the issuer the option to pay interest in <strong>cash or in kind</strong> (issuing more debt). Toggle preserves liquidity when near-term FCF is tight.<br><br>Risk: PIK compounds the debt balance at a very high rate. Lenders charge a premium for the toggle option. Common in aggressive LBOs."},
{cat:L,q:"What is a secondary LBO?",a:"A PE-owned company is sold to another PE fund. Increasingly common — PE-to-PE transactions account for a significant share of deal flow.<br><br>The selling fund exits; the buying fund sees a new improvement opportunity or believes leverage can be reapplied. Valuation can be contentious — no synergies on either side."},
{cat:L,q:"What is the difference between levered and unlevered FCF in an LBO model?",a:"<strong>Unlevered FCF:</strong> Cash generated before debt service — used in WACC-based DCF.<br><br><strong>Levered FCF:</strong> Cash remaining after interest and principal repayment — drives the debt paydown schedule in an LBO model.<br><br>In LBO modelling, levered FCF determines how quickly debt is repaid and how much equity value is created through deleveraging."},
{cat:L,q:"What is a management incentive plan (MIP) in a PE deal?",a:"A pool of equity (typically 10–20% of total equity) reserved for the management team in an LBO. Structured as options or sweet equity with performance hurdles (IRR and MoM thresholds).<br><br>Aligns management with PE sponsor — management only participates in upside once the sponsor has achieved its return targets. A critical retention and incentive tool."},
{cat:L,q:"What does a 'cash sweep' mean in an LBO debt schedule?",a:"A provision requiring the company to use a defined percentage (often 50–100%) of excess cash flow to repay debt ahead of scheduled amortisation.<br><br>Accelerates deleveraging — a key value driver in LBOs. The sweep percentage often steps down over time as leverage falls. Lenders include it to reduce default risk; sponsors prefer lower sweeps to preserve cash for distributions or add-ons."},
{cat:L,q:"What is EBITDA to cash conversion and why does it matter in LBO analysis?",a:"<strong>Cash conversion = Levered FCF / EBITDA.</strong> Measures what percentage of EBITDA actually becomes free cash available to repay debt.<br><br>Reduced by: high interest, capex, WC build, taxes. A business with 80%+ cash conversion is highly attractive for LBOs — it generates reliable cash to service and repay debt. Low cash conversion (e.g. 30%) makes debt service risky."},
{cat:L,q:"What are the key risks in an LBO that can cause a loss?",a:"(1) <strong>Over-leverage:</strong> EBITDA falls → can't cover interest → default.<br>(2) <strong>Cyclical/macro downturn:</strong> Revenue decline compresses FCF below debt service.<br>(3) <strong>Multiple compression:</strong> Exit multiple below entry — magnified by leverage.<br>(4) <strong>Operational underperformance:</strong> Improvement thesis fails to materialise.<br>(5) <strong>Refinancing risk:</strong> Debt maturity wall during tight credit markets."},
{cat:L,q:"What is 'dry powder' in the context of private equity?",a:"Committed but undeployed capital — money LPs have committed to a PE fund that hasn't yet been invested in companies. Represents the fund's available firepower for new deals or follow-on investments.<br><br>High industry-wide dry powder can drive up deal valuations (more competition for assets). Tracking dry powder is a useful indicator of M&A market activity outlook."},
// ── MARKETS (25) ─────────────────────────────────────────────────────────────
{cat:MK,q:"What is the yield curve and why does an inverted curve matter?",a:"Plots government bond yields across maturities. <strong>Normal:</strong> upward slope. <strong>Inverted:</strong> short-term yields exceed long-term — has preceded every US recession since 1955.<br><br>Signal: market expects rates to fall due to slowing growth. The 2yr/10yr spread is most watched; deeply inverted 2022–2024."},
{cat:MK,q:"Why do bond prices fall when interest rates rise?",a:"Existing bonds have fixed coupons. When new bonds are issued at higher yields, existing lower-coupon bonds are less attractive — prices fall to equalise yield-to-maturity.<br><br><strong>Price ↑ when yield ↓; Price ↓ when yield ↑.</strong><br><br>Duration measures this sensitivity: ~8–10% price fall per 100bps for a 10-year bond; ~2% for a 2-year bond."},
{cat:MK,q:"What is duration and why does it matter?",a:"Duration = <strong>price sensitivity of a bond to interest rate changes.</strong> Modified duration of 7 → bond falls ~7% if rates rise 1%.<br><br>Longer maturity → higher duration. Lower coupon → higher duration.<br><br>Matters for: portfolio risk management, ALM for pensions, understanding why long-duration assets (infrastructure, growth stocks) are most rate-sensitive."},
{cat:MK,q:"What is the equity risk premium (ERP)?",a:"<strong>ERP = Expected Market Return − Risk-Free Rate.</strong><br><br>Additional return investors demand for holding equities over risk-free assets. Historical: ~5–6% in developed markets. Implied ERP varies with market conditions.<br><br>Key CAPM input — changes in ERP directly affect cost of equity and therefore all DCF valuations."},
{cat:MK,q:"What is quantitative easing and how does it affect asset prices?",a:"Central bank buys financial assets (typically government bonds) to inject liquidity and lower long-term rates.<br><br>Effects: (1) Lower Rf → compressed discount rates → higher valuations; (2) portfolio rebalancing into riskier assets; (3) currency depreciation; (4) higher inflation expectations. QT (the reversal) has the opposite compressing effect."},
{cat:MK,q:"What happens to equity markets when the central bank raises rates?",a:"Rate hikes: (1) Increase WACC → compress equity multiples; (2) risk-free assets become more competitive vs equities; (3) higher borrowing costs → slower earnings growth.<br><br><strong>Most affected:</strong> high-multiple growth stocks, REITs, utilities.<br><strong>More resilient:</strong> banks, commodity producers."},
{cat:MK,q:"What is a credit spread and what does widening signal?",a:"<strong>Credit spread = Corporate bond yield − Risk-free yield (same maturity).</strong><br><br>Compensates for default risk and illiquidity. Widening signals: rising perceived default risk, falling risk appetite, deteriorating macro outlook.<br><br>HY spreads are a leading indicator of economic stress — spiked in March 2020 and 2022."},
{cat:MK,q:"What is the difference between investment grade and high yield debt?",a:"<strong>Investment grade (IG):</strong> BBB−/Baa3 or above. Lower default risk. Most institutional mandates restricted to IG.<br><br><strong>High yield (HY):</strong> BB+/Ba1 or below ('junk'). Higher default risk and yield. LBO financing is almost always HY. 'Fallen angels' (IG downgraded to HY) often face forced selling pressure from mandated investors."},
{cat:MK,q:"What drove equity market declines in 2022?",a:"(1) <strong>Inflation shock:</strong> CPI hit 40-year highs post-COVID supply disruption and fiscal stimulus.<br>(2) <strong>Rate hikes:</strong> Fed raised rates 425bps in 12 months (fastest since Volcker), compressing multiples.<br>(3) <strong>Ukraine invasion:</strong> Energy/commodity price spike, European growth shock.<br><br>Growth/tech fell 40–70%. Value/energy outperformed."},
{cat:MK,q:"What is the VIX?",a:"CBOE Volatility Index — measures implied volatility of 30-day S&amp;P 500 options. The 'fear gauge.'<br><br>Normal: 15–20. Above 30 = significant stress. GFC peak ~80; COVID March 2020 ~85.<br><br>High VIX compresses risk appetite, widens credit spreads, and typically freezes M&amp;A and capital markets activity."},
{cat:MK,q:"What is the difference between fiscal and monetary policy?",a:"<strong>Monetary:</strong> Central bank tools — interest rates, QE/QT. Operates through credit conditions. Fast-acting.<br><br><strong>Fiscal:</strong> Government spending and taxation. Direct effect on aggregate demand. Slower (requires political process).<br><br>The mix matters: expansionary fiscal + tight monetary = high real rates (Volcker era, 1980–82)."},
{cat:MK,q:"What drives the AUD/USD exchange rate?",a:"(1) <strong>Iron ore and commodity prices</strong> — AUD tracks the commodity complex closely.<br>(2) <strong>Interest rate differentials</strong> vs USD.<br>(3) <strong>China economic conditions</strong> — Australia's largest trading partner.<br>(4) <strong>Risk sentiment</strong> — AUD is a 'risk-on' currency; weakens sharply in risk-off environments.<br>(5) Current account balance."},
{cat:MK,q:"What is an IPO and walk through the process.",a:"Initial Public Offering — first sale of shares to public investors.<br><br>(1) Appoint lead banks; (2) due diligence and prospectus preparation; (3) regulatory lodgement (ASIC/SEC); (4) institutional roadshow; (5) book building — collect indications of interest; (6) price the deal; (7) trading commences.<br><br>Typically 3–6 months. Banks earn 3–7% underwriting fee."},
{cat:MK,q:"What is the difference between primary and secondary capital markets?",a:"<strong>Primary:</strong> New securities issued for the first time (IPO, follow-on offering, new bond). Proceeds go to the issuer.<br><br><strong>Secondary:</strong> Existing securities traded between investors (ASX, NYSE). No proceeds to issuer. Secondary market liquidity is what makes primary markets viable."},
{cat:MK,q:"What happened in the 2008 GFC and what were the key lessons?",a:"Subprime mortgages → securitised into CDOs/MBS → excessive bank leverage (30–40x) → housing price collapse → mortgage defaults → MBS collapse → Lehman Brothers bankruptcy (Sep 2008) → credit markets froze → global recession.<br><br><strong>Lessons:</strong> Leverage amplifies systemic fragility; opacity in securitisation distributes but doesn't eliminate risk; moral hazard of implicit government backstops."},
{cat:MK,q:"What is a rights issue?",a:"Secondary equity offering where existing shareholders receive rights to buy additional shares at a <strong>discounted price,</strong> pro-rata to current holdings. Preserves proportional ownership if rights are taken up. Used to raise capital for acquisitions or debt repayment.<br><br>Heavy discount signals financial stress; moderate discount for an acquisition is routine."},
{cat:MK,q:"What is convertible debt?",a:"A bond the holder can <strong>convert into equity</strong> at a preset conversion price. Issued at lower yield than straight debt (the option has value). Attractive for high-volatility companies.<br><br>On conversion: debt falls, equity dilutes. Accounted for as debt + equity component under IFRS. Often issued by growth companies with limited straight debt capacity."},
{cat:MK,q:"What are the main equity offering types for a listed company?",a:"<strong>IPO:</strong> Initial listing.<br><strong>Follow-on:</strong> New shares issued post-IPO.<br><strong>Block trade:</strong> Large parcel sold quickly (overnight accelerated bookbuild).<br><strong>Rights issue:</strong> Pro-rata to existing shareholders at discount.<br><strong>Placement:</strong> Shares to specific investors — limited to 15% of issued capital per year without shareholder approval (ASX LR 7.1)."},
{cat:MK,q:"What is the Fed's dual mandate?",a:"The Fed must pursue: (1) <strong>maximum employment</strong> and (2) <strong>stable prices</strong> (~2% inflation target).<br><br>These often conflict — in 2022–23 the Fed aggressively hiked rates to control inflation, accepting employment risk. The RBA has a similar dual mandate. The ECB focuses primarily on price stability."},
{cat:MK,q:"What is EBITDA leverage and interest coverage? Why does each matter?",a:"<strong>Net Leverage = Net Debt / EBITDA</strong> — measures balance sheet burden. Benchmarks: IG ~1–2.5x; HY 3–5x; LBO 4–7x.<br><br><strong>Interest Coverage = EBIT / Interest</strong> — measures ability to service debt. Below 2x = stressed.<br><br>Both used in credit covenants — lenders monitor simultaneously."},
{cat:MK,q:"What is mark-to-market accounting and when is it problematic?",a:"Valuing assets at current fair market value vs historical cost. Required for trading securities and derivatives.<br><br>In stressed markets: can trigger a <strong>death spiral</strong> — falling prices → write-downs → forced selling → further falls. Central to 2008 crisis debate. FASB relaxed strict MTM rules during the GFC."},
{cat:MK,q:"What is a credit default swap (CDS)?",a:"A derivative where one party pays periodic premiums in exchange for protection against a credit event (default) on a reference entity. Functions like insurance on debt.<br><br>CDS spreads reflect market-implied default probability. Central to the 2008 GFC — AIG sold vast amounts of CDS on mortgage-backed securities without adequate capital."},
{cat:MK,q:"What is Basel III and why does it matter to capital markets?",a:"An international regulatory framework for banks (post-GFC). Key requirements: higher minimum capital ratios (CET1 ≥ 4.5%); leverage ratio limits; liquidity coverage ratio (LCR); net stable funding ratio (NSFR).<br><br>Impact on capital markets: banks hold more capital → less balance sheet for lending and market-making → higher borrowing costs, wider bid-ask spreads in bond markets."},
{cat:MK,q:"What is APRA and what does it regulate?",a:"The <strong>Australian Prudential Regulation Authority</strong> — supervises banks, insurers, and superannuation funds. Sets capital adequacy standards for ADIs (authorised deposit-taking institutions) under the Basel framework (adapted for Australia).<br><br>Relevant to IB in: M&amp;A of financial institutions (APRA approval required), capital market transactions involving banks, and credit analysis of financial sector companies."},
{cat:MK,q:"What is the difference between a bond and a loan?",a:"<strong>Loan:</strong> Private bilateral or syndicated debt between a borrower and a lender (bank). Negotiated terms, relationship-driven, less liquid, typically floating rate, can have maintenance covenants.<br><br><strong>Bond:</strong> Publicly issued, tradeable in secondary markets, fixed rate typical, broader investor base (institutional funds). More standardised terms, incurrence covenants, higher minimum deal size. IB earns fees on both."},
// ── QUICK MATH (30) ──────────────────────────────────────────────────────────
{cat:QM,q:"EV = $500M, EBITDA = $50M. What is the EV/EBITDA multiple?",a:"<span class='math'>$500M ÷ $50M = 10.0x</span><br><br>The market pays $10 for every $1 of EBITDA. Compare to sector median to assess relative value. Reciprocal = 10% EBITDA yield."},
{cat:QM,q:"Revenue = $200M, EBIT margin = 15%, D&A = $10M. What is EBITDA and EBITDA margin?",a:"EBIT = $200M × 15% = $30M<br>EBITDA = $30M + $10M = <span class='math'>$40M</span><br>EBITDA margin = $40M ÷ $200M = <span class='math'>20%</span>"},
{cat:QM,q:"EPS = $5, P/E = 20x. What is the share price?",a:"<span class='math'>$5 × 20 = $100 per share</span><br><br>Reciprocal: 5% earnings yield. Compare to risk-free rate (~4.5%) — modest premium for equity risk."},
{cat:QM,q:"What is 15% of $340M? Do it mentally.",a:"10% = $34M. 5% = $17M. 15% = <span class='math'>$51M</span><br><br>Mental math shortcut: always decompose to 10% + 5%. You'll be asked to do this in interviews without a calculator."},
{cat:QM,q:"EBITDA = $80M, net debt = $200M. What is the leverage ratio?",a:"<span class='math'>$200M ÷ $80M = 2.5x net leverage</span><br><br>Moderate/investment-grade territory. Lenders get nervous above 4x. LBO targets typically enter at 5–6x and aim to exit at 3–4x."},
{cat:QM,q:"PE buys at $300M EV (60% debt). Exits at $500M EV 5 years later having repaid $80M of debt. What is MoM?",a:"Entry equity = $300M − $180M = $120M<br>Exit debt = $180M − $80M = $100M<br>Exit equity = $500M − $100M = $400M<br>MoM = $400M ÷ $120M = <span class='math'>3.33x</span>"},
{cat:QM,q:"Approximate the IRR for a 3x MoM over 5 years.",a:"(3)^(1/5) − 1 = 1.246 − 1 = <span class='math'>~24.6% IRR</span><br><br>Memorise these benchmarks:<br>2x / 5yr ≈ 15% · 3x / 5yr ≈ 25% · 2x / 3yr ≈ 26% · 3x / 3yr ≈ 44%"},
{cat:QM,q:"WACC = 10%, terminal growth = 2.5%, terminal FCF = $100M. What is the terminal value?",a:"TV = FCF(1+g) ÷ (WACC−g)<br>= $100M × 1.025 ÷ (0.10 − 0.025)<br>= $102.5M ÷ 0.075<br>= <span class='math'>$1,367M (~$1.4B)</span><br><br>Note how small the denominator (0.075) is — TV is extremely sensitive to WACC and growth rate assumptions."},
{cat:QM,q:"A bond has face value $1,000, coupon 5%, trades at $950. Is yield above or below 5%?",a:"<strong>Above 5%.</strong> Price &lt; par → yield &gt; coupon.<br><br>The discount compensates buyers for the lower coupon vs new market-rate bonds. <span class='math'>Exact yield ≈ 5.5%.</span> Price/yield move inversely — fundamental fixed income relationship."},
{cat:QM,q:"EV = $600M, net debt = $100M, diluted shares = 50M. Implied share price?",a:"Equity Value = $600M − $100M = $500M<br>Share price = $500M ÷ 50M = <span class='math'>$10.00</span><br><br>If you saw this stock trading at $12, the stock would be 20% above your comps-implied price."},
{cat:QM,q:"Revenue grows from $150M to $180M. What is the growth rate?",a:"($180M − $150M) ÷ $150M = $30M ÷ $150M = <span class='math'>20%</span><br><br>Quick check: $150M × 1.20 = $180M. ✓"},
{cat:QM,q:"EBITDA = $60M, D&A = $15M, interest = $10M, tax = 30%. What is net income?",a:"EBIT = $60M − $15M = $45M<br>EBT = $45M − $10M = $35M<br>Tax = $35M × 30% = $10.5M<br>Net income = <span class='math'>$24.5M</span>"},
{cat:QM,q:"Depreciation increases by $5M. Tax rate 30%. What is the net income impact?",a:"Pre-tax income ↓ $5M → tax saving = $5M × 30% = $1.5M<br>Net income impact = <span class='math'>−$3.5M</span><br><br>Operating CF impact = +$1.5M (tax saving). D&A is a non-cash shield — increases CF while decreasing net income."},
{cat:QM,q:"20M shares outstanding, $50M net cash, EV = $400M. Implied share price?",a:"Net cash = negative net debt, so:<br>Equity Value = EV + Net Cash = $400M + $50M = $450M<br>Share price = $450M ÷ 20M = <span class='math'>$22.50</span><br><br>Common error: subtracting cash instead of adding it when company has net cash."},
{cat:QM,q:"What is 1/20 as a percentage? Why is this useful?",a:"<span class='math'>1 ÷ 20 = 5%</span><br><br>The reciprocal of any P/E or EV/EBITDA multiple gives the earnings yield. P/E of 20x → 5% earnings yield. Compare to risk-free rate (~4.5%) — the equity risk premium in this case is only ~50bps, implying expensive valuation."},
{cat:QM,q:"EBITDA = $40M, D&A = $6M, ΔWC = $2M outflow, capex = $8M, tax = 30%. Unlevered FCF?",a:"EBIT = $40M − $6M = $34M<br>NOPAT = $34M × 0.70 = $23.8M<br>+ D&A: +$6M → $29.8M<br>− ΔWC: −$2M → $27.8M<br>− Capex: −$8M → <span class='math'>$19.8M unlevered FCF</span>"},
{cat:QM,q:"Approximate 1/12 as a percentage.",a:"<span class='math'>1 ÷ 12 ≈ 8.3%</span><br><br>A 12x EV/EBITDA implies an 8.3% EBITDA yield. Quick mental reciprocal of multiples is a standard analyst shortcut used constantly in deal discussions."},
{cat:QM,q:"Business grows FCF at 4% forever. WACC = 9%. Value per $1 of current FCF?",a:"TV = $1 × 1.04 ÷ (0.09 − 0.04) = $1.04 ÷ 0.05 = <span class='math'>$20.80</span><br><br>Interpretation: a $1 stream of perpetually growing FCF (at 4%, discounted at 9%) is worth $20.80. This is effectively a 20.8x FCF multiple."},
{cat:QM,q:"100M shares at $8, $50M net cash. Buyer offers $10/share. Premium? EV paid?",a:"Premium = ($10 − $8) ÷ $8 = <span class='math'>25%</span><br>Equity paid = 100M × $10 = $1,000M<br>EV paid = $1,000M − $50M net cash = <span class='math'>$950M</span><br><br>Remember: subtract net cash (or add net debt) to get from equity value to EV."},
{cat:QM,q:"Revenue $500M, gross margin 40%, SG&A $80M, D&A $20M. What is EBIT?",a:"Gross Profit = $500M × 40% = $200M<br>EBIT = $200M − $80M − $20M = <span class='math'>$100M (20% EBIT margin)</span>"},
{cat:QM,q:"What is the Rule of 72?",a:"<strong>72 ÷ annual return % ≈ years to double money.</strong><br><br>8% → 9 years. 12% → 6 years. 24% → 3 years. 20% IRR → ~3.6 years to double.<br><br>Quick mental compounding benchmark. A 20%+ IRR PE fund doubles LP money in under 4 years."},
{cat:QM,q:"EBITDA $100M, comp multiple 8x, net debt $150M, 25M shares. Implied share price?",a:"EV = $100M × 8 = $800M<br>Equity = $800M − $150M = $650M<br>Share price = $650M ÷ 25M = <span class='math'>$26.00</span>"},
