a:"Net cash = negative net debt → Equity Value = EV + Net Cash = $400M + $50M = $450M. Share price = $450M ÷ 20M = <span class='math'>$22.50</span>. Common error: subtracting cash instead of adding when company has net cash position.",
d:["Equity Value = EV − Net Cash = $400M − $50M = $350M. Share price = $350M ÷ 20M = $17.50 (net cash is subtracted because it reduces equity risk).",
   "Equity Value = EV = $400M (net cash is already included in EV). Share price = $400M ÷ 20M = $20.00.",
   "Equity Value = Net Cash = $50M (EV and equity value are not comparable — only the cash balance accrues to shareholders). Share price = $50M ÷ 20M = $2.50."]},

{cat:QM,q:"Revenue $500M, gross margin 40%, SG&A $80M, D&A $20M. What is EBIT?",
a:"Gross Profit = $500M × 40% = $200M. EBIT = $200M − $80M − $20M = <span class='math'>$100M</span> (20% EBIT margin).",
d:["Gross Profit = $500M − 40% = $300M. EBIT = $300M − $80M − $20M = $200M (gross margin means dollars subtracted, not percentage applied).",
   "Gross Profit = $500M × 40% = $200M. EBIT = $200M − $80M = $120M (D&A is excluded from EBIT as a non-cash charge).",
   "Gross Profit = $500M × 60% = $300M (COGS margin is 60%). EBIT = $300M − $80M − $20M = $200M."]},

{cat:QM,q:"A company trades at 15x P/E. What is the earnings yield and how does it compare to a 4.5% risk-free rate?",
a:"Earnings yield = 1/15 = <span class='math'>6.67%</span>. Equity risk premium implied = 6.67% − 4.5% = 2.17% — below the historical long-run ERP of ~5–6%. This suggests the stock is richly valued relative to bonds.",
d:["Earnings yield = 15% (the P/E multiple expressed as a percentage). ERP = 15% − 4.5% = 10.5% — significantly above the historical average, suggesting the stock is cheap.",
   "Earnings yield = 15 × 4.5% = 67.5% — calculated by multiplying the P/E by the risk-free rate to produce a risk-adjusted earnings return.",
   "Earnings yield = 1/(15 × 4.5%) = 1.48% — normalising the earnings yield by the risk-free rate produces the real earnings yield on a rate-adjusted basis."]},

{cat:QM,q:"EBITDA = $40M, D&A = $6M, ΔWC = $2M outflow, capex = $8M, tax = 30%. Unlevered FCF?",
a:"EBIT = $34M. NOPAT = $34M × 0.70 = $23.8M. + D&A $6M = $29.8M. − ΔWC $2M = $27.8M. − Capex $8M = <span class='math'>$19.8M</span>.",
d:["UFCF = EBITDA × (1−tax) − Capex = $40M × 0.70 − $8M = $20M (WC changes and D&A adjustments are excluded for simplicity).",
   "UFCF = EBITDA − Tax − Capex = $40M − $12M − $8M = $20M (D&A and WC changes net to zero and cancel out).",
   "UFCF = (EBITDA − ΔWC − Capex) × (1−tax) = ($40M − $2M − $8M) × 0.70 = $21M (tax applied to the full operating cash flow including D&A)."]},

{cat:QM,q:"What is the Rule of 72?",
a:"<strong>72 ÷ annual return % ≈ years to double money.</strong> 8% → 9 years. 12% → 6 years. 24% → 3 years. 20% IRR → ~3.6 years to double. A 20%+ IRR PE fund doubles LP money in under 4 years.",
d:["The Rule of 72 states that 72 × annual return % = total return over the investment period — multiply the return by years held to get the MoM multiple.",
   "The Rule of 72 means 72% is the maximum IRR achievable in a 1-year investment — above this threshold, leverage requirements become prohibitive.",
   "The Rule of 72 approximates the tax shield: 72 × tax rate% ≈ the effective interest rate benefit from using debt in an LBO capital structure."]},

{cat:QM,q:"100M shares at $8, $50M net cash. Buyer offers $10/share. What is the premium paid and EV?",
a:"Premium = ($10 − $8) ÷ $8 = <span class='math'>25%</span>. Equity paid = 100M × $10 = $1,000M. EV = $1,000M − $50M net cash = <span class='math'>$950M</span>.",
d:["Premium = ($10 − $8) = $2 absolute premium. EV = 100M × $10 + $50M net cash = $1,050M (net cash is added to reflect the full enterprise cost).",
   "Premium = $10 / $8 = 1.25% (premium is the ratio of offer to market price). EV = $1,000M + $50M = $1,050M.",
   "Premium = ($8 − $10) / $10 = −20% (calculated as decline from offer to market price). EV = $1,000M (cash position is irrelevant to enterprise value)."]},

{cat:QM,q:"Interest expense = $20M, EBIT = $60M. Interest coverage ratio?",
a:"<span class='math'>$60M ÷ $20M = 3.0x</span>. Above the typical 2.5x bank covenant floor — comfortable. Below 2x = lender concern. Below 1x = company cannot cover interest from operations.",
d:["$20M ÷ $60M = 0.33x — coverage ratios below 1x are actually preferred by lenders because they indicate the company is maximising its debt capacity.",
   "$60M × $20M = $1,200M — the coverage ratio is calculated by multiplying EBIT and interest to produce a combined debt service capacity metric.",

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let mode='mc'; // 'mc' or 'flip'
let filteredDeck=[...CARDS];
let idx=0,isFlipped=false,answered=false;
let sessionCorrect=0,sessionWrong=0;
let wrongIds=new Set();
let activeFilter='All';

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
function init(){buildFilters();applyFilter('All');}

function setMode(m){
  mode=m;
  document.getElementById('mode-mc').classList.toggle('active',m==='mc');
  document.getElementById('mode-flip').classList.toggle('active',m==='flip');
  document.getElementById('mc-area').classList.toggle('active-mode',m==='mc');
  document.getElementById('flip-area').classList.toggle('active-mode',m==='flip');
  document.getElementById('flip-controls').style.display=m==='flip'?'flex':'none';
  document.getElementById('feedback-row').style.display=m==='flip'?'flex':'none';
  document.getElementById('kb-hint').innerHTML=m==='mc'
    ?'<kbd>A</kbd><kbd>B</kbd><kbd>C</kbd><kbd>D</kbd> select &nbsp;·&nbsp; <kbd>→</kbd> next'
    :'<kbd>Space</kbd> flip &nbsp;·&nbsp; <kbd>→</kbd> next &nbsp;·&nbsp; <kbd>←</kbd> prev &nbsp;·&nbsp; <kbd>1</kbd> missed &nbsp;·&nbsp; <kbd>2</kbd> got it';
  sessionCorrect=0;sessionWrong=0;wrongIds.clear();
  idx=0;answered=false;isFlipped=false;
  hideComplete();
  renderCard();updateStats();
}

function buildFilters(){
  const cats=['All',...new Set(CARDS.map(c=>c.cat))];
  const cont=document.getElementById('filters');
  cont.innerHTML='';
  cats.forEach(cat=>{
    const n=cat==='All'?CARDS.length:CARDS.filter(c=>c.cat===cat).length;
    const btn=document.createElement('button');
    btn.className='filter-btn'+(cat===activeFilter?' active':'');
    btn.textContent=`${cat} (${n})`;
    btn.onclick=()=>applyFilter(cat);
    cont.appendChild(btn);
  });
}

function applyFilter(cat){
  activeFilter=cat;
  filteredDeck=cat==='All'?[...CARDS]:CARDS.filter(c=>c.cat===cat);
  idx=0;isFlipped=false;answered=false;sessionCorrect=0;sessionWrong=0;wrongIds.clear();
  document.querySelectorAll('.filter-btn').forEach(b=>{
    const lbl=b.textContent.replace(/ \(\d+\)$/,'');
    b.classList.toggle('active',lbl===cat);
  });
  hideComplete();
  renderCard();updateStats();
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function renderCard(){
  if(!filteredDeck.length)return;
  answered=false;
  if(mode==='mc') renderMC();
  else renderFlip();
}

function renderMC(){
  const card=filteredDeck[idx];
  document.getElementById('mc-cat').textContent=card.cat.toUpperCase();
  document.getElementById('mc-num').textContent=`${idx+1} / ${filteredDeck.length}`;
  document.getElementById('mc-q').textContent=card.q;

  // Build 4 options: correct + 3 distractors, shuffled
  const options=shuffle([
    {text:card.a, correct:true},
    {text:card.d[0], correct:false},
    {text:card.d[1], correct:false},
    {text:card.d[2], correct:false},
  ]);

  const letters=['A','B','C','D'];
  const cont=document.getElementById('mc-options');
  cont.innerHTML='';
  options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='mc-opt';
    btn.dataset.correct=opt.correct;
    btn.innerHTML=`<span class="opt-letter">${letters[i]}</span><span class="opt-text">${opt.text}</span>`;
    btn.onclick=()=>selectOption(btn,opt.correct,card);
    cont.appendChild(btn);
  });

  // Reset result panel
  document.getElementById('result-panel').classList.remove('visible');
  document.getElementById('mc-next-row').classList.remove('visible');
  document.getElementById('btn-retry').style.display='none';
}

function selectOption(btn,correct,card){
  if(answered)return;
  answered=true;

  const allBtns=document.querySelectorAll('.mc-opt');
  allBtns.forEach(b=>b.disabled=true);

  if(correct){
    btn.classList.add('correct');
    sessionCorrect++;
  } else {
    btn.classList.add('wrong');
    sessionWrong++;
    wrongIds.add(CARDS.indexOf(card));
    // reveal correct
    allBtns.forEach(b=>{if(b.dataset.correct==='true')b.classList.add('reveal-correct');});
  }

  // Show result panel
  const panel=document.getElementById('result-panel');
  const verdict=document.getElementById('result-verdict');
  const expl=document.getElementById('result-explanation');
  const studyDiv=document.getElementById('result-study-links');

  verdict.textContent=correct?'✓ Correct':'✗ Incorrect';
  verdict.className='result-verdict '+(correct?'correct':'wrong');
  expl.innerHTML=card.a;

  // Study links
  const links=STUDY_LINKS[card.cat]||[];
  if(!correct&&links.length){
    studyDiv.innerHTML='<div class="study-links-title">Go deeper:</div>'+links.map(l=>`<a href="${l.u}" target="_blank" rel="noopener">→ ${l.t}</a>`).join('');
    studyDiv.style.display='flex';
  } else {
    studyDiv.style.display='none';
  }

  panel.classList.add('visible');

  const nextRow=document.getElementById('mc-next-row');
  nextRow.classList.add('visible');
  if(wrongIds.size>0) document.getElementById('btn-retry').style.display='';

  updateStats();
}

function renderFlip(){
  const card=filteredDeck[idx];
  isFlipped=false;
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('card-tag').textContent=card.cat.toUpperCase();
  document.getElementById('card-tag-back').textContent='Answer — '+card.cat;
  document.getElementById('card-q').textContent=card.q;
  document.getElementById('card-a').innerHTML=card.a;
  document.getElementById('card-counter').textContent=`${idx+1} / ${filteredDeck.length}`;
  document.getElementById('feedback-row').classList.remove('visible');
}

function flipCard(){
  if(mode!=='flip'||!filteredDeck.length)return;
  isFlipped=!isFlipped;
  document.getElementById('card-inner').classList.toggle('flipped',isFlipped);
  document.getElementById('feedback-row').classList.toggle('visible',isFlipped);
}

function markCard(known){
  const globalId=CARDS.indexOf(filteredDeck[idx]);
  if(known){sessionCorrect++;wrongIds.delete(globalId);}
  else{sessionWrong++;wrongIds.add(globalId);}
  updateStats();
  nextCard();
}

// ─────────────────────────────────────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────────────────────────────────────
function nextCard(){
  if(idx<filteredDeck.length-1){idx++;answered=false;renderCard();}
  else{showComplete();}
}
function prevCard(){if(idx>0){idx--;answered=false;renderCard();}}

function shuffleDeck(){
  filteredDeck=shuffle([...filteredDeck]);
  idx=0;answered=false;isFlipped=false;sessionCorrect=0;sessionWrong=0;wrongIds.clear();
  hideComplete();renderCard();updateStats();
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

// ─────────────────────────────────────────────────────────────────────────────
// STATS
// ─────────────────────────────────────────────────────────────────────────────
function updateStats(){
  const total=filteredDeck.length;
  const reviewed=sessionCorrect+sessionWrong;
  const pct=total>0?Math.round(reviewed/total*100):0;
  document.getElementById('stat-known').textContent=sessionCorrect;
  document.getElementById('stat-missed').textContent=sessionWrong;
  document.getElementById('stat-remaining').textContent=total-reviewed;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-label').textContent=pct+'% complete';
}

// ─────────────────────────────────────────────────────────────────────────────
// COMPLETE
// ─────────────────────────────────────────────────────────────────────────────
function showComplete(){
  hideComplete();
  document.getElementById('complete-screen').classList.add('visible');
  const total=sessionCorrect+sessionWrong;
  const pct=total>0?Math.round(sessionCorrect/total*100):0;
  document.getElementById('score-big').innerHTML=`<span>${sessionCorrect}</span> / ${total}`;
  const msg=pct>=85
    ?'Strong recall. Now focus on verbal delivery — articulating under pressure is different from recognising the right answer.'
    :pct>=60
    ?'Solid base. Re-run missed cards and work on connecting concepts across categories — interviewers probe the links.'
    :'Keep going. Focus on understanding the logic behind each answer — if you understand it, the right option becomes obvious.';
  document.getElementById('score-msg').textContent=msg;

  const missed=CARDS.filter((_,i)=>wrongIds.has(i));
  const ss=document.getElementById('study-section');
  const sl=document.getElementById('study-list');
  if(missed.length>0){
    const cats=[...new Set(missed.map(c=>c.cat))];
    ss.style.display='block';
    sl.innerHTML=cats.map(cat=>{
      const count=missed.filter(c=>c.cat===cat).length;
      const links=STUDY_LINKS[cat]||[];
      return `<div class="study-item">
        <div><span class="study-item-cat">${cat}</span><span class="study-item-missed">${count} missed</span></div>
        <div class="study-item-links">${links.map(l=>`<a href="${l.u}" target="_blank" rel="noopener">→ ${l.t}</a>`).join('')}</div>
      </div>`;
    }).join('');
  } else {ss.style.display='none';}
}

function hideComplete(){document.getElementById('complete-screen').classList.remove('visible');}

function restartAll(){
  filteredDeck=activeFilter==='All'?[...CARDS]:CARDS.filter(c=>c.cat===activeFilter);
  idx=0;answered=false;isFlipped=false;sessionCorrect=0;sessionWrong=0;wrongIds.clear();
  hideComplete();renderCard();updateStats();
}

function restartMissed(){
  const missed=CARDS.filter((_,i)=>wrongIds.has(i));
  if(!missed.length){restartAll();return;}
  filteredDeck=missed;
  idx=0;answered=false;isFlipped=false;sessionCorrect=0;sessionWrong=0;wrongIds.clear();
  hideComplete();renderCard();updateStats();
}

// ─────────────────────────────────────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='BUTTON')return;
  if(mode==='mc'){
    const opts=document.querySelectorAll('.mc-opt');
    if(e.key==='a'||e.key==='A'){opts[0]&&opts[0].click();}
    if(e.key==='b'||e.key==='B'){opts[1]&&opts[1].click();}
    if(e.key==='c'||e.key==='C'){opts[2]&&opts[2].click();}
    if(e.key==='d'||e.key==='D'){opts[3]&&opts[3].click();}
    if(e.key==='ArrowRight'&&answered)nextCard();
  } else {
    if(e.key===' '||e.key==='Enter'){e.preventDefault();flipCard();}
    if(e.key==='ArrowRight')nextCard();
    if(e.key==='ArrowLeft')prevCard();
    if(e.key==='1'&&isFlipped)markCard(false);
    if(e.key==='2'&&isFlipped)markCard(true);
  }
});

document.getElementById('flip-area').onclick=flipCard;

init();
</script>
