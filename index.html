<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IB Interview Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a; --surface:#111111; --surface2:#1a1a1a; --border:#2a2a2a;
  --accent:#c9a84c; --accent2:#e8c97a; --text:#f0ece4; --text-dim:#888880;
  --text-muted:#444440; --green:#4caf7d; --red:#e05252; --blue:#6fa8dc;
  --amber:#e8a838;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center}

header{width:100%;padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:20;gap:10px}
header h1{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:var(--accent);white-space:nowrap}
header .sub{font-family:'DM Mono',monospace;font-size:0.55rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.hdr-right{display:flex;gap:7px;flex-shrink:0}

.app{width:100%;max-width:860px;padding:14px 12px 60px;display:flex;flex-direction:column;gap:12px}

/* Mode toggle */
.mode-toggle{display:flex;gap:6px}
.mode-btn{flex:1;padding:7px 10px;border-radius:3px;border:1px solid var(--border);background:none;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s;text-align:center}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#0a0a0a;font-weight:500}

/* Filters */
.filters{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;flex-wrap:nowrap}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;background:none;border:1px solid var(--border);color:var(--text-muted);padding:4px 10px;border-radius:20px;font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .15s}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#0a0a0a;font-weight:500}

/* Stats */
.stats-bar{display:flex;align-items:center;gap:12px;padding:9px 13px;background:var(--surface);border:1px solid var(--border);border-radius:3px;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:1px}
.stat-val{font-family:'Playfair Display',serif;font-size:1.05rem}
.stat-val.green{color:var(--green)}
.stat-val.red{color:var(--red)}
.stat-label{font-family:'DM Mono',monospace;font-size:0.52rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase}
.divider{width:1px;height:26px;background:var(--border);flex-shrink:0}
.progress-wrap{flex:1;min-width:70px;display:flex;flex-direction:column;gap:4px}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width .4s ease}
.progress-label{font-family:'DM Mono',monospace;font-size:0.52rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em}

/* ── FLIP CARD MODE ── */
.card-area{perspective:1400px;cursor:pointer;display:none}
.card-area.active-mode{display:block}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid var(--border);border-radius:10px;padding:22px 26px;display:flex;flex-direction:column;justify-content:space-between;background:var(--surface);overflow:hidden}
.card-face.back{transform:rotateY(180deg);background:var(--surface2);border-color:rgba(201,168,76,.3)}
.card-tag{font-family:'DM Mono',monospace;font-size:0.57rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;flex-shrink:0}
.card-tag-back{color:var(--text-muted)}
.card-body{flex:1;display:flex;align-items:center;overflow:hidden}
.card-q{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:400;line-height:1.5;color:var(--text)}
@media(max-width:480px){.card-q{font-size:1rem}}
.card-a{font-size:0.83rem;line-height:1.78;color:var(--text);font-weight:300;overflow-y:auto;max-height:230px;-webkit-overflow-scrolling:touch;padding-right:4px}
.card-a::-webkit-scrollbar{width:3px}
.card-a::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.card-a strong{color:var(--accent2);font-weight:500}
.card-a em{color:var(--text-dim)}
.card-hint{font-family:'DM Mono',monospace;font-size:0.53rem;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase;text-align:right;flex-shrink:0;margin-top:6px}

/* ── MC MODE ── */
.mc-area{display:none;flex-direction:column;gap:12px}
.mc-area.active-mode{display:flex}
.mc-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px 24px;display:flex;flex-direction:column;gap:14px}
@media(max-width:480px){.mc-card{padding:16px 16px}}
.mc-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mc-cat{font-family:'DM Mono',monospace;font-size:0.57rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}
.mc-num{font-family:'DM Mono',monospace;font-size:0.57rem;color:var(--text-muted);margin-left:auto}
.mc-q{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:400;line-height:1.5;color:var(--text)}
@media(max-width:480px){.mc-q{font-size:1rem}}
.mc-options{display:flex;flex-direction:column;gap:7px}
.mc-opt{
  display:flex;align-items:flex-start;gap:10px;padding:11px 14px;
  border-radius:7px;border:1px solid var(--border);background:none;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.84rem;
  line-height:1.5;cursor:pointer;text-align:left;width:100%;
  transition:border-color .15s,background .15s
}
.mc-opt:hover:not(:disabled){border-color:var(--accent);background:rgba(201,168,76,.06)}
.mc-opt:disabled{cursor:default}
.mc-opt.correct{border-color:var(--green)!important;background:rgba(76,175,125,.12)!important}
.mc-opt.wrong{border-color:var(--red)!important;background:rgba(229,82,82,.1)!important}
.mc-opt.reveal-correct{border-color:var(--green)!important;background:rgba(76,175,125,.07)!important}
.opt-letter{font-family:'DM Mono',monospace;font-size:0.7rem;font-weight:500;color:var(--text-muted);flex-shrink:0;margin-top:1px;min-width:16px}
.mc-opt.correct .opt-letter,.mc-opt.correct .opt-text{color:var(--green)}
.mc-opt.wrong .opt-letter,.mc-opt.wrong .opt-text{color:var(--red)}
.mc-opt.reveal-correct .opt-letter,.mc-opt.reveal-correct .opt-text{color:var(--green)}

/* Result panel */
.result-panel{display:none;flex-direction:column;gap:10px;padding:14px 16px;border-radius:7px;border:1px solid var(--border);background:var(--surface2)}
.result-panel.visible{display:flex}
.result-verdict{font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:.08em;text-transform:uppercase;font-weight:500}
.result-verdict.correct{color:var(--green)}
.result-verdict.wrong{color:var(--red)}
.result-explanation{font-size:0.83rem;line-height:1.72;color:var(--text);font-weight:300}
.result-explanation strong{color:var(--accent2);font-weight:500}
.result-explanation em{color:var(--text-dim)}

/* Study links */
.study-links{display:flex;flex-direction:column;gap:4px;padding-top:6px;border-top:1px solid var(--border)}
.study-links-title{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:2px}
.study-links a{font-size:0.78rem;color:var(--blue);text-decoration:none;padding:1px 0}
.study-links a:hover{text-decoration:underline}

/* Controls */
.controls{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap}
.btn{background:none;border:1px solid var(--border);color:var(--text-dim);padding:8px 16px;border-radius:3px;font-family:'DM Mono',monospace;font-size:0.63rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--text-dim);color:var(--text)}
.btn:active{background:var(--surface2)}
.btn-primary{border-color:var(--accent);color:var(--accent)}
.btn-primary:hover{background:var(--accent);color:#0a0a0a}
.btn-missed{border-color:var(--red);color:var(--red)}
.btn-missed:hover{background:var(--red);color:#fff}
.card-counter{font-family:'DM Mono',monospace;font-size:0.66rem;color:var(--text-muted);min-width:60px;text-align:center}

/* Flip feedback */
.feedback-row{display:flex;gap:8px;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
.feedback-row.visible{opacity:1;pointer-events:all}
.btn-know{border-color:var(--green);color:var(--green)}
.btn-know:hover{background:var(--green);color:#0a0a0a}

/* Next button for MC */
.mc-next-row{display:none;justify-content:center;gap:8px}
.mc-next-row.visible{display:flex}

/* Complete */
.complete-screen{display:none;flex-direction:column;align-items:center;text-align:center;gap:14px;padding:44px 28px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
.complete-screen.visible{display:flex}
.complete-screen h2{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--accent)}
.score-big{font-family:'Playfair Display',serif;font-size:2.8rem}
.score-big span{color:var(--accent)}
.complete-screen>p{color:var(--text-dim);font-size:0.86rem;max-width:380px;line-height:1.65}
.comp-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.study-section{width:100%;max-width:440px;border-top:1px solid var(--border);padding-top:16px;text-align:left;margin-top:4px}
.study-section h3{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.study-item{padding:8px 0;border-bottom:1px solid var(--border)}
.study-item-cat{font-size:0.8rem;font-weight:500;color:var(--text)}
.study-item-missed{font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--red);margin-left:8px}
.study-item-links{margin-top:5px;display:flex;flex-direction:column;gap:3px}
.study-item-links a{font-size:0.75rem;color:var(--blue);text-decoration:none}
.study-item-links a:hover{text-decoration:underline}

.kb-hint{font-family:'DM Mono',monospace;font-size:0.55rem;color:var(--text-muted);text-align:center;letter-spacing:.08em}
.kb-hint kbd{background:var(--surface);border:1px solid var(--border);padding:1px 5px;border-radius:2px}
@media(max-width:600px){.kb-hint{display:none}}

.math{font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--accent2);background:rgba(201,168,76,.09);padding:1px 6px;border-radius:3px}
</style>
</head>
<body>

<header>
  <div>
    <h1>IB Interview Prep</h1>
    <div class="sub">225 cards · Summer Analyst 2026</div>
  </div>
  <div class="hdr-right">
    <button class="btn" onclick="shuffleDeck()" style="padding:6px 12px;font-size:0.58rem">⇄ Shuffle</button>
  </div>
</header>

<div class="app">

  <!-- Mode toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="mode-mc" onclick="setMode('mc')">Multiple Choice</button>
    <button class="mode-btn" id="mode-flip" onclick="setMode('flip')">Flip Cards</button>
  </div>

  <!-- Filters -->
  <div class="filters" id="filters"></div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat"><span class="stat-val green" id="stat-known">0</span><span class="stat-label">Correct</span></div>
    <div class="divider"></div>
    <div class="stat"><span class="stat-val red" id="stat-missed">0</span><span class="stat-label">Review</span></div>
    <div class="divider"></div>
    <div class="stat"><span class="stat-val" id="stat-remaining">—</span><span class="stat-label">Left</span></div>
    <div class="divider"></div>
    <div class="progress-wrap">
      <div class="progress-label" id="progress-label">0% complete</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- ── MULTIPLE CHOICE ── -->
  <div class="mc-area active-mode" id="mc-area">
    <div class="mc-card">
      <div class="mc-meta">
        <span class="mc-cat" id="mc-cat"></span>
        <span class="mc-num" id="mc-num"></span>
      </div>
      <div class="mc-q" id="mc-q"></div>
      <div class="mc-options" id="mc-options"></div>
      <div class="result-panel" id="result-panel">
        <div class="result-verdict" id="result-verdict"></div>
        <div class="result-explanation" id="result-explanation"></div>
        <div class="study-links" id="result-study-links"></div>
      </div>
    </div>
    <div class="mc-next-row" id="mc-next-row">
      <button class="btn btn-primary" onclick="nextCard()">Next Question →</button>
      <button class="btn btn-missed" onclick="restartMissed()" id="btn-retry" style="display:none">Review Missed</button>
    </div>
  </div>

  <!-- ── FLIP CARDS ── -->
  <div id="flip-area" class="card-area" style="height:360px">
    <div class="card-inner" id="card-inner">
      <div class="card-face front">
        <div style="display:flex;flex-direction:column;height:100%">
          <div class="card-tag" id="card-tag"></div>
          <div class="card-body"><div class="card-q" id="card-q"></div></div>
        </div>
        <div class="card-hint">Tap to reveal answer</div>
      </div>
      <div class="card-face back">
        <div style="display:flex;flex-direction:column;height:100%">
          <div class="card-tag card-tag-back" id="card-tag-back">Answer</div>
          <div class="card-body"><div class="card-a" id="card-a"></div></div>
        </div>
        <div class="card-hint">Rate yourself below</div>
      </div>
    </div>
  </div>

  <!-- Complete -->
  <div class="complete-screen" id="complete-screen">
    <h2>Session Complete</h2>
    <div class="score-big" id="score-big"></div>
    <p id="score-msg"></p>
    <div class="comp-btns">
      <button class="btn btn-primary" onclick="restartAll()">Restart All</button>
      <button class="btn btn-missed" onclick="restartMissed()">Review Missed Only</button>
    </div>
    <div class="study-section" id="study-section" style="display:none">
      <h3>Topics to Revisit</h3>
      <div id="study-list"></div>
    </div>
  </div>

  <!-- Controls (flip mode) -->
  <div class="controls" id="flip-controls" style="display:none">
    <button class="btn" onclick="prevCard()">← Prev</button>
    <span class="card-counter" id="card-counter">1 / —</span>
    <button class="btn" onclick="nextCard()">Next →</button>
  </div>
  <div class="feedback-row" id="feedback-row">
    <button class="btn btn-missed" onclick="markCard(false)">✗ Missed</button>
    <button class="btn btn-know" onclick="markCard(true)">✓ Got it</button>
  </div>

  <div class="kb-hint" id="kb-hint">
    <kbd>A</kbd><kbd>B</kbd><kbd>C</kbd><kbd>D</kbd> select &nbsp;·&nbsp; <kbd>→</kbd> next
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// STUDY LINKS
// ─────────────────────────────────────────────────────────────────────────────
const C="Accounting",V="Valuation",MA="M&A",L="LBO",MK="Markets",QM="Quick Math",B="Behavioural";

const STUDY_LINKS={
  [C]:[
    {t:"Three Financial Statements (CFI)",u:"https://corporatefinanceinstitute.com/resources/accounting/three-financial-statements/"},
    {t:"IFRS Standards",u:"https://www.ifrs.org/issued-standards/list-of-standards/"},
    {t:"Financial Accounting (Khan Academy)",u:"https://www.khanacademy.org/economics-finance-domain/core-finance/accounting-and-financial-stateme"}
  ],
  [V]:[
    {t:"DCF Model Training (CFI)",u:"https://corporatefinanceinstitute.com/resources/valuation/dcf-model-training/"},
    {t:"WACC Formula (CFI)",u:"https://corporatefinanceinstitute.com/resources/valuation/what-is-wacc-formula/"},
    {t:"Valuation Methods (CFI)",u:"https://corporatefinanceinstitute.com/resources/valuation/valuation-methods/"}
  ],
  [MA]:[
    {t:"M&A Overview (CFI)",u:"https://corporatefinanceinstitute.com/resources/valuation/mergers-acquisitions-ma/"},
    {t:"Accretion/Dilution (CFI)",u:"https://corporatefinanceinstitute.com/resources/valuation/accretion-dilution/"},
    {t:"M&A Interview Questions (M&I)",u:"https://mergersandinquisitions.com/ma-interview-questions/"}
  ],
  [L]:[
    {t:"LBO Model (CFI)",u:"https://corporatefinanceinstitute.com/resources/valuation/lbo-model/"},
    {t:"Leveraged Buyout (Investopedia)",u:"https://www.investopedia.com/terms/l/leveragedbuyout.asp"},
    {t:"LBO Interview Questions (WSO)",u:"https://www.wallstreetoasis.com/resources/interviews/lbo-modeling-interview-questions"}
  ],
  [MK]:[
    {t:"Fixed Income Basics (Investopedia)",u:"https://www.investopedia.com/terms/f/fixedincome.asp"},
    {t:"Macroeconomics (Khan Academy)",u:"https://www.khanacademy.org/economics-finance-domain/macroeconomics"},
    {t:"Capital Markets (CFI)",u:"https://corporatefinanceinstitute.com/resources/career-map/sell-side/capital-markets/capital-markets/"}
  ],
  [QM]:[
    {t:"Mental Math for Finance (WSO)",u:"https://www.wallstreetoasis.com/resources/skills/finance/mental-math"},
    {t:"Financial Modelling (CFI)",u:"https://corporatefinanceinstitute.com/resources/excel/financial-modeling/"},
    {t:"IB Math (M&I)",u:"https://mergersandinquisitions.com/investment-banking-math/"}
  ],
  [B]:[
    {t:"IB Interview Q&A (M&I)",u:"https://mergersandinquisitions.com/investment-banking-interview-questions-and-answers/"},
    {t:"Fit Questions (WSO)",u:"https://www.wallstreetoasis.com/resources/interviews/investment-banking-interview-questions"},
    {t:"Tell Me About Yourself (M&I)",u:"https://mergersandinquisitions.com/tell-me-about-yourself/"}
  ]
};

// ─────────────────────────────────────────────────────────────────────────────
// CARD DATA — question, correct answer (a), and 3 distractors (d1/d2/d3)
// Distractors are SHORT plausible wrong answers drawn from related concepts
// ─────────────────────────────────────────────────────────────────────────────
const CARDS=[
// ── ACCOUNTING ───────────────────────────────────────────────────────────────
{cat:C,q:"Walk me through the three financial statements and how they link.",
a:"Income Statement (Revenue → Net Income over a period) + Balance Sheet (Assets = Liabilities + Equity at a point in time) + Cash Flow Statement (Operating + Investing + Financing). Net Income flows to Retained Earnings; D&A is a CFS add-back; Capex reduces cash and increases PP&E.",
d:["Revenue Statement, Asset Register, and Funds Flow Statement — linked via net profit and working capital movements.",
   "P&L, Net Worth Statement, and Treasury Report — Net Income bridges to equity via dividend payments.",
   "Income Statement, Ledger, and Capital Account — linked through the trial balance and bank reconciliation."]},

{cat:C,q:"A $10 increase in depreciation flows through the statements (40% tax). What happens to operating cash flow?",
a:"Operating cash flow <strong>increases by $4</strong>. Net income falls $6 (D&A ↑ $10, tax saving $4). On the CFS, the $10 non-cash D&A is added back, netting to +$4.",
d:["Operating cash flow falls by $6 — depreciation reduces net income and cash flow by the after-tax amount.",
   "Operating cash flow is unchanged — depreciation is non-cash and has no effect on the CFS.",
   "Operating cash flow falls by $10 — depreciation is an operating cost that directly reduces cash generation."]},

{cat:C,q:"What is the cash conversion cycle (CCC)?",
a:"<strong>CCC = DSO + DIO − DPO.</strong> It measures the days cash is tied up in operations. A negative CCC (e.g. Amazon) means you collect from customers before paying suppliers — a structural cash advantage.",
d:["CCC = Revenue / Average Receivables × 365 — a measure of how quickly revenue converts to cash receipts.",
   "CCC = Operating CF / Net Income — measures the quality of earnings and accrual-to-cash conversion rate.",
   "CCC = (Debt + Equity) / EBITDA — measures how many years of operating earnings are needed to repay total capital."]},

{cat:C,q:"What is working capital and how does an increase affect cash flow?",
a:"<strong>WC = Current Assets − Current Liabilities</strong> (excl. cash and short-term debt). An increase in WC is a <em>use</em> of cash — AR grows or inventory builds. It appears as a negative adjustment in operating CF.",
d:["WC = Total Assets − Total Liabilities; an increase reflects improved financial strength and always generates cash.",
   "WC = Cash + Receivables; an increase is always positive for cash flow because more liquid assets are held.",
   "WC = Revenue − Operating Costs; an increase means the business is more profitable and generating more cash."]},

{cat:C,q:"What is the difference between EBIT and EBITDA?",
a:"<strong>EBIT</strong> = Revenue − COGS − OpEx (operating profit). <strong>EBITDA</strong> = EBIT + D&A — adds back non-cash charges to approximate operating cash generation before capex policy. EBITDA is capital-structure and capex-neutral.",
d:["EBIT includes interest expense; EBITDA excludes it — making EBITDA better for comparing levered companies.",
   "EBITDA includes tax; EBIT excludes it — EBIT is pre-tax and therefore more comparable across jurisdictions.",
   "They are identical except EBITDA is reported on a per-share basis, making it comparable to EPS."]},

{cat:C,q:"What is goodwill and when does it arise?",
a:"<strong>Goodwill = Purchase Price − Fair Value of Net Identifiable Assets Acquired.</strong> Arises in acquisitions — represents unidentifiable intangibles (brand, workforce, synergies). Under IFRS/US GAAP: not amortised, tested annually for impairment.",
d:["Goodwill is an internally generated intangible that appears on the balance sheet when a brand achieves market recognition.",
   "Goodwill = Total Assets − Net Debt; it measures the excess of a company's assets over its financial obligations.",
   "Goodwill arises when a company revalues its existing intangible assets to fair market value during an annual review."]},

{cat:C,q:"What is the difference between accounts receivable and deferred revenue?",
a:"<strong>AR:</strong> Service delivered, invoice sent, cash not yet received — an <em>asset.</em> <strong>Deferred Revenue:</strong> Cash received, service not yet delivered — a <em>liability.</em> Once service is delivered, deferred revenue is recognised as revenue on the P&L.",
d:["AR is a liability (you owe the customer a refund); deferred revenue is an asset (you've been pre-paid for future work).",
   "Both are current assets — AR represents earned revenue while deferred revenue represents cash collected in advance.",
   "AR and deferred revenue are the same concept; the naming convention depends on whether the company uses cash or accrual accounting."]},

{cat:C,q:"How does IFRS 16 change lease accounting?",
a:"Most leases are capitalised: lessee records a <strong>right-of-use asset</strong> and a <strong>lease liability.</strong> Payments split into interest (IS) and principal (CFS financing). EBITDA increases (rent removed, replaced by D&A + interest); leverage ratios rise.",
d:["IFRS 16 removes operating leases from the balance sheet — only finance leases are now recognised as assets and liabilities.",
   "IFRS 16 requires all leases to be expensed as operating costs — removing the distinction between operating and finance leases.",
   "IFRS 16 reduces EBITDA by reclassifying lease payments as operating costs instead of financing activities."]},

{cat:C,q:"What are deferred tax assets and liabilities?",
a:"<strong>DTA:</strong> Tax paid exceeds P&L tax expense — a future benefit (e.g. tax loss carryforwards). An asset. <strong>DTL:</strong> P&L tax expense less than tax actually owed — you'll pay more later (e.g. accelerated tax depreciation). A liability.",
d:["DTA = current year tax owed but not yet paid (a creditor balance); DTL = tax overpaid in a prior year awaiting refund.",
   "Both are the same thing — deferred tax arises when there is a difference between book and cash profit, always resulting in a future cash outflow.",
   "DTA = prepaid expenses on the tax return; DTL = accrued expenses deducted for tax before they appear on the P&L."]},

{cat:C,q:"What is unlevered free cash flow?",
a:"<strong>Unlevered FCF = EBIT × (1−t) + D&A − ΔWC − Capex.</strong> 'Unlevered' means before interest — it represents cash available to ALL capital providers (debt and equity). Used in DCF models discounted at WACC.",
d:["Unlevered FCF = Net Income + D&A — it strips out working capital movements which are considered non-recurring.",
   "Unlevered FCF = EBITDA − Taxes — a simplified measure that ignores capex because it is discretionary.",
   "Unlevered FCF = Operating CF − Dividend Payments — it measures how much cash is available after returning capital to shareholders."]},

{cat:C,q:"What is the interest coverage ratio and what does a ratio below 1x signal?",
a:"<strong>Interest Coverage = EBIT / Interest Expense.</strong> Below 1x means the company <em>cannot cover interest from operations</em> — an immediate distress signal. Lenders typically require 2.5x+ as a covenant.",
d:["Interest Coverage = Net Income / Interest Expense; below 2x signals the company is paying more in dividends than interest, creating solvency risk.",
   "Interest Coverage = EBITDA / Total Debt; below 1x means the company's earnings are insufficient to repay all debt within one year.",
   "Interest Coverage = Revenue / Interest Expense; below 5x signals the company is over-leveraged relative to its sales base."]},

{cat:C,q:"What is ROIC and why is it considered better than ROE for measuring business quality?",
a:"<strong>ROIC = NOPAT / Invested Capital</strong> (IC = equity + net debt). Unlike ROE, ROIC is not distorted by leverage. <strong>ROIC > WACC = value creation.</strong> A highly levered company can have high ROE but low ROIC.",
d:["ROIC = Net Income / Total Revenue — it's better than ROE because it measures profitability per dollar of sales rather than per dollar of equity.",
   "ROIC = Operating CF / Total Assets — it's preferred because it uses cash flow rather than accounting profit, removing accrual distortions.",
   "ROIC = Gross Profit / Equity — it's better than ROE because gross profit is harder to manipulate than net income."]},

{cat:C,q:"How do share buybacks affect the three financial statements?",
a:"<strong>BS:</strong> Cash ↓; Treasury stock (contra-equity) ↑ → equity decreases. <strong>IS:</strong> No direct impact, but EPS rises as share count falls. <strong>CFS:</strong> Buyback = financing outflow.",
d:["Buybacks reduce revenue (recorded as a contra-revenue item), increase the equity balance, and are classified as investing outflows on the CFS.",
   "Buybacks are expensed on the income statement as a compensation cost, reducing net income and retained earnings on the balance sheet.",
   "Buybacks increase net income (by reducing diluted EPS denominator), reduce total liabilities, and appear as operating outflows on the CFS."]},

{cat:C,q:"What is normalised EBITDA?",
a:"EBITDA adjusted for one-time, non-recurring items: restructuring charges, M&A transaction costs, litigation settlements, impairments, gains/losses on asset sales. The goal is 'run-rate' earnings power — buyers and sellers negotiate this figure directly.",
d:["Normalised EBITDA is EBITDA divided by the number of employees — a productivity-adjusted measure used to compare businesses of different sizes.",
   "Normalised EBITDA adjusts for seasonal fluctuations only, converting quarterly EBITDA to an annual run-rate for comparison purposes.",
   "Normalised EBITDA subtracts average capex from EBITDA to produce a maintenance-adjusted measure of operating cash generation."]},

{cat:C,q:"What is the DuPont decomposition of ROE?",
a:"<strong>ROE = Profit Margin × Asset Turnover × Financial Leverage</strong> = (NI/Revenue) × (Revenue/Assets) × (Assets/Equity). ROE can be improved via higher margins, more efficient asset use, or more leverage — but leverage-driven ROE is riskier.",
d:["ROE = EBITDA Margin × Revenue Growth × Debt/Equity — decomposes return into profitability, growth, and capital structure.",
   "ROE = Gross Margin × Operating Leverage × Interest Coverage — shows how margin quality and fixed cost structure drive shareholder returns.",
   "ROE = FCF Yield × P/E Multiple × Dividend Payout — links market valuation metrics to shareholder return components."]},

{cat:C,q:"What is operating leverage?",
a:"The sensitivity of EBIT to revenue changes, driven by fixed vs variable cost mix. <strong>High fixed costs:</strong> a 10% revenue rise may produce 25% EBIT growth — magnifies gains and losses. DoL = % change in EBIT / % change in Revenue.",
d:["Operating leverage measures the ratio of debt to equity in a company's capital structure — the higher the ratio, the more financially leveraged the business.",
   "Operating leverage is the sensitivity of operating cash flow to changes in interest rates — businesses with floating-rate debt have high operating leverage.",
   "Operating leverage measures how much of revenue is retained as gross profit — a high gross margin equals high operating leverage."]},

{cat:C,q:"What happens to the balance sheet when a company pays a $20M dividend?",
a:"<strong>CFS:</strong> Cash ↓ $20M (financing outflow). <strong>BS:</strong> Cash ↓ $20M; Retained Earnings ↓ $20M → equity falls. <strong>IS:</strong> No impact — dividends are distributions of profit, not an expense.",
d:["Dividends reduce both cash and revenue on the income statement, and are shown as an investing outflow on the CFS.",
   "Dividends increase liabilities (dividends payable) and reduce cash when paid — there is no impact on retained earnings.",
   "Dividends reduce net income and therefore retained earnings on the IS, and are classified as operating outflows on the CFS."]},

{cat:C,q:"What is purchase price allocation (PPA) and why does it affect post-deal EPS?",
a:"After an acquisition, the purchase price is allocated to fair values of identifiable assets/liabilities, including intangibles not on the target's books (customer lists, brand, technology). Residual = goodwill. PPA intangibles create <strong>additional D&A charges</strong> post-deal that depress reported EPS.",
d:["PPA is the process of recording the acquisition at historical cost — it has no post-deal EPS impact because book values are used throughout.",
   "PPA determines how much of the purchase price is expensed immediately vs capitalised — it increases reported EPS by deferring costs.",
   "PPA is an IFRS requirement to record the target's existing goodwill at fair value — it has no incremental effect on post-deal depreciation charges."]},

{cat:C,q:"What is the difference between capex and opex?",
a:"<strong>Capex:</strong> Spending on long-lived assets — capitalised on BS, depreciated over time, appears in CFS investing activities. <strong>Opex:</strong> Expensed immediately on P&L. Capitalising opex flatters current earnings at the cost of future D&A charges.",
d:["Capex is recorded on the income statement as an operating expense; opex is capitalised on the balance sheet and amortised over its useful life.",
   "Capex and opex are identical in accounting treatment — both are expensed in the period incurred — but differ only in the size of the expenditure.",
   "Capex refers to recurring maintenance spend; opex refers to growth-oriented investment in new equipment or facilities."]},

{cat:C,q:"What is the cash conversion cycle and what does a negative CCC mean?",
a:"<strong>CCC = DSO + DIO − DPO.</strong> Negative CCC means the company <em>collects from customers before paying suppliers</em> — suppliers effectively finance the business. Amazon and Walmart are classic examples.",
d:["A negative CCC means the company is paying suppliers faster than it collects from customers — a sign of strong supplier relationships and bargaining power.",
   "A negative CCC indicates the company's days inventory outstanding exceeds its days payable — it holds excess inventory relative to its payables cycle.",
   "A negative CCC means the company has more debt than equity — a capital structure measure indicating financial leverage exceeds 100%."]},

// ── VALUATION ────────────────────────────────────────────────────────────────
{cat:V,q:"What are the three primary valuation methodologies?",
a:"<strong>DCF</strong> (intrinsic value from projected cash flows), <strong>Trading Comps</strong> (market-based multiples from comparable public companies), and <strong>Precedent Transactions</strong> (what acquirers paid — includes control premium). Always triangulate across all three.",
d:["Book Value, Liquidation Value, and Replacement Cost — these measure what the business is worth if it stopped operating today.",
   "EV/EBITDA, P/E, and P/Book — these are the primary valuation multiples and collectively constitute the three main methodologies.",
   "Revenue Multiple, Earnings Multiple, and Asset Multiple — representing the three main financial statement lines used for valuation."]},

{cat:V,q:"Walk me through a DCF step by step.",
a:"(1) Project unlevered FCF for 5–10 years. (2) Calculate Terminal Value (Gordon Growth or exit multiple). (3) Discount FCFs and TV at WACC. (4) Sum = Enterprise Value. (5) Bridge to Equity Value: EV − Net Debt − Preferred − Minorities. (6) ÷ diluted shares = implied share price.",
d:["(1) Project net income for 5 years. (2) Apply a P/E multiple to terminal year earnings. (3) Discount back at cost of equity. (4) Add net debt to get to Enterprise Value. (5) Divide by shares for price per share.",
   "(1) Identify comparable companies. (2) Calculate their average EV/EBITDA multiple. (3) Apply to subject company EBITDA. (4) Subtract debt. (5) Divide by shares outstanding.",
   "(1) Project levered FCF for 3 years. (2) Apply an exit multiple to final year revenue. (3) Discount at cost of equity. (4) Sum represents total equity value. (5) Divide by share count."]},

{cat:V,q:"How do you calculate WACC?",
a:"<strong>WACC = (E/V) × Ke + (D/V) × Kd × (1−t)</strong> where E = equity market cap, D = market value of debt, V = E+D, Ke = CAPM cost of equity, Kd = pre-tax cost of debt, t = marginal tax rate. Use market values, not book values, for weights.",
d:["WACC = Cost of Equity + Cost of Debt — a simple average of the two financing costs weighted equally regardless of capital structure.",
   "WACC = (Net Income / Equity) × (1−t) — the after-tax return on equity adjusted for the tax shield on debt financing.",
   "WACC = Risk-Free Rate + Equity Risk Premium — the minimum required return that reflects both market risk and company-specific risk factors."]},

{cat:V,q:"What is CAPM?",
a:"<strong>Ke = Rf + β × ERP.</strong> Rf = risk-free rate, β = sensitivity to market returns, ERP = equity risk premium. Assumes investors hold diversified portfolios and only price systematic (market) risk.",
d:["CAPM: Ke = Rf + (Rm − β) / ERP — adjusts the risk-free rate downward for assets with beta less than 1 to reflect their defensive characteristics.",
   "CAPM: Ke = β × Rf + ERP — weights the risk-free rate by beta to produce a return that scales with market sensitivity.",
   "CAPM: Ke = Rf × ERP + β — multiplies the risk-free rate and ERP together before adding beta as a company-specific adjustment."]},

{cat:V,q:"What is the difference between Enterprise Value and Equity Value?",
a:"<strong>EV = Equity Value + Net Debt + Preferred + Minority Interest.</strong> EV is the value to ALL capital providers. Equity Value is what's left for shareholders. Use EV multiples (EV/EBITDA) with operating metrics; equity multiples (P/E) for per-share analysis.",
d:["Enterprise Value is the market capitalisation of a company; Equity Value is market cap plus net debt — the total value including financial obligations.",
   "Enterprise Value equals book value of assets; Equity Value equals book value of equity — the difference is the book value of all liabilities.",
   "Enterprise Value is the value of common equity only; Equity Value includes preferred shares and minority interests in the calculation."]},

{cat:V,q:"What is terminal value and what % of DCF value does it typically represent?",
a:"TV = PV of all cash flows beyond the forecast period. Typically <strong>60–80%+ of total DCF value.</strong> Two methods: (1) Gordon Growth: FCF(1+g)/(WACC−g); (2) Exit Multiple: terminal EBITDA × EV/EBITDA. TV dominates — always run a sensitivity table.",
d:["Terminal value typically represents 20–30% of total DCF value — the majority of value comes from near-term cash flows which are more certain.",
   "Terminal value is the book value of assets at the end of the forecast period, representing the residual liquidation value of the business.",
   "Terminal value equals the final year's free cash flow divided by the discount rate — it assumes zero growth and represents a flat perpetuity."]},

{cat:V,q:"What is a reasonable terminal growth rate in a DCF and why can't it exceed WACC?",
a:"Typically <strong>2–3%</strong> — roughly long-run nominal GDP growth. Above long-run GDP implies the company eventually grows larger than the entire economy. Must be less than WACC or the Gordon Growth formula produces a negative denominator (value → infinity).",
d:["Terminal growth rate should equal the company's historical 5-year revenue CAGR — anchoring to recent performance ensures the assumption is defensible.",
   "Terminal growth rates above WACC are acceptable for high-growth businesses — the formula still works because the discount rate is applied to each year separately.",
   "Terminal growth is typically set at 5–7% to reflect long-run inflation plus real GDP growth, matching the nominal growth rate of the overall economy."]},

{cat:V,q:"Why do precedent transactions trade at a premium to trading comps?",
a:"Precedents include a <strong>control premium</strong> (typically 20–40%) — an acquirer must offer more than market price to convince shareholders to sell. They also capture synergies priced into the deal and reflect M&A market conditions at announcement.",
d:["Precedent transactions trade at a discount to comps — acquirers negotiate hard and target companies accept lower prices to guarantee deal certainty.",
   "The premium in precedents reflects the target's superior earnings growth — faster-growing companies command higher multiples in M&A than in the public market.",
   "Precedents trade at a premium because they use trailing EBITDA — forward EBITDA (used in comps) is always higher, making comps appear cheaper on a multiple basis."]},

{cat:V,q:"Why add minority interest to Enterprise Value?",
a:"Consolidated P&L includes 100% of a partially-owned subsidiary's EBITDA even if the parent owns, say, 80%. For EV/EBITDA to be consistent, EV must include the minority's 20% claim — so minority interest (a BS liability) is added to EV.",
d:["Minority interest is added to EV because it represents cash on the balance sheet that could be used to repay debt — similar to how net cash is subtracted.",
   "Minority interest is added to EV to exclude the parent company's proportional ownership from the calculation and reflect the standalone subsidiary value.",
   "Minority interest is subtracted from EV (not added) — it represents a claim that reduces the value available to the acquiring company's shareholders."]},

{cat:V,q:"What is a sum-of-the-parts (SOTP) valuation and when is it used?",
a:"Used for conglomerates where different segments warrant different multiples. Value each segment separately, sum them, subtract corporate overhead. Often reveals a <strong>conglomerate discount</strong> — the whole trades at less than the sum of parts, implying value from a breakup.",
d:["SOTP is used for early-stage companies with no revenue — it values each growth option separately and sums them to arrive at total equity value.",
   "SOTP adds the DCF value, trading comps value, and precedent transaction value together and divides by three to produce a blended valuation.",
   "SOTP is used exclusively for banks and financial institutions where different business lines (retail, investment banking, wealth) carry different risk profiles."]},

{cat:V,q:"What does a high EV/EBITDA multiple imply?",
a:"The market pays more per dollar of EBITDA — implying: (1) high growth expectations; (2) strong competitive moat; (3) capital-light model with high FCF conversion; (4) scarcity/strategic premium; (5) low-rate environment compressing discount rates.",
d:["A high EV/EBITDA multiple implies the company is overvalued and should be shorted — multiples above 10x are almost always unjustified by fundamentals.",
   "A high EV/EBITDA multiple implies the company has high levels of debt — because the enterprise value includes debt, a higher multiple means more leverage.",
   "A high EV/EBITDA means EBITDA is depressed relative to the company's asset base — it's a sign of poor operational performance and cost inefficiency."]},

{cat:V,q:"How do stock options and warrants affect equity valuation?",
a:"Use the <strong>treasury stock method:</strong> assume options are exercised and proceeds are used to repurchase shares at the current market price. Net dilutive shares = options exercised − shares repurchased. Only in-the-money options create dilution.",
d:["Options and warrants have no effect on equity value — they are off-balance-sheet items that only impact equity when actually exercised and recorded.",
   "All options (in- and out-of-the-money) are included in diluted share count — the strike price is irrelevant to the dilution calculation.",
   "Options reduce equity value by their total exercise price — the entire potential cash inflow from exercise is subtracted from enterprise value."]},

{cat:V,q:"What is the LBO floor in a sale process?",
a:"The price at which a PE buyer can acquire a company and still achieve target returns (~20%+ IRR). In competitive processes, the LBO floor sets a <em>minimum</em> price — strategic buyers must pay above it to win. Bankers model the LBO to show clients what PE will bid.",
d:["The LBO floor is the minimum debt a company can raise to complete a leveraged buyout — typically 50% of the acquisition price.",
   "The LBO floor is the book value of the target's assets — private equity buyers will not pay more than the replacement cost of the business.",
   "The LBO floor is the 52-week low share price — PE buyers anchor bids to recent trading lows to maximise their equity return."]},

{cat:V,q:"What is the PEG ratio and what is its main limitation?",
a:"<strong>PEG = P/E / Earnings Growth Rate.</strong> Adjusts P/E for growth — a 30x P/E growing at 30% has PEG=1. PEG &lt; 1 traditionally considered cheap. Limitation: growth rate selection is subjective; ignores risk, FCF conversion, and balance sheet quality.",
d:["PEG = P/E / Dividend Yield — adjusts the earnings multiple for the proportion of earnings returned to shareholders as dividends.",
   "PEG = EV/EBITDA / Revenue Growth — compares the enterprise value multiple to the company's top-line growth rate to assess operating leverage.",
   "PEG = Market Cap / Earnings Growth — a simplified version of P/E that removes the earnings denominator to focus purely on expected growth."]},

{cat:V,q:"When would you prefer EV/EBIT over EV/EBITDA?",
a:"EV/EBIT deducts D&A — capturing the economic cost of capital consumption. For capex-intensive businesses, two companies with identical EBITDA but different capex needs look the same on EV/EBITDA but different on EV/EBIT. Prefer for: industrials, manufacturing, infrastructure.",
d:["EV/EBIT is preferred for capital-light businesses like software — because they have minimal D&A, EBIT and EBITDA are essentially identical.",
   "EV/EBIT should be used for companies with negative EBITDA — because adding back D&A produces a positive number, making the multiple meaningful.",
   "EV/EBIT is preferred when comparing companies across different tax jurisdictions — because EBIT excludes tax while EBITDA does not."]},

{cat:V,q:"How does a rising interest rate environment affect DCF valuations?",
a:"Rising rates increase WACC (higher Rf → higher Ke; higher Kd). Higher WACC compresses the PV of all future cash flows. Long-duration assets (growth stocks, infrastructure) are hit hardest — a 100bps WACC increase can compress DCF equity value 15–25%+.",
d:["Rising rates increase DCF valuations — a higher risk-free rate means investors require lower equity returns, compressing the discount rate and inflating present values.",
   "Rising rates have no effect on DCF valuations because the terminal growth rate adjusts upward in line with interest rates, keeping WACC−g constant.",
   "Rising rates only affect companies with floating-rate debt — fixed-rate borrowers see no change in WACC and therefore no change in their DCF value."]},

{cat:V,q:"What is a sensitivity table in a DCF?",
a:"A two-variable data table showing how implied valuation changes across key assumptions — typically <strong>WACC vs terminal growth rate</strong> or WACC vs exit multiple. Prevents false precision. Every DCF in a pitchbook includes one.",
d:["A sensitivity table shows how EPS changes across different revenue scenarios — it is used in equity research to stress-test earnings forecasts.",
   "A sensitivity table ranks comparable companies by EV/EBITDA multiple from lowest to highest — showing where the subject company falls in its peer group.",
   "A sensitivity table compares the DCF valuation to trading comps and precedent transactions — showing the range of values across all three methodologies."]},

// ── M&A ───────────────────────────────────────────────────────────────────────
{cat:MA,q:"What are the main strategic rationales for M&A?",
a:"Revenue synergies (cross-sell, new geographies), cost synergies (headcount, procurement, facilities), capability acquisition (technology, IP, talent), market consolidation (pricing power), and vertical integration (control supply chain). Empirically: most acquisitions destroy acquirer value — synergies are overestimated.",
d:["The primary rationale is always cost reduction — revenue synergies are theoretically possible but are never given credit by valuation analysts.",
   "M&A is driven exclusively by financial engineering — by adding leverage to a target's balance sheet, sponsors can extract returns regardless of strategic fit.",
   "M&A rationale centres on tax optimisation — acquirers target companies with large NOLs to offset their own taxable income and reduce the effective tax rate."]},

{cat:MA,q:"Walk me through an accretion/dilution analysis.",
a:"Compare acquirer's standalone EPS vs pro-forma EPS. (1) Identify consideration mix. (2) Calculate financing cost (debt = interest×(1−t); stock = shares×Ke). (3) Add target's net income + after-tax synergies. (4) Subtract incremental D&A on acquired intangibles. (5) ÷ new share count. Pro-forma EPS > standalone = accretive.",
d:["Accretion/dilution compares the acquirer's pre-deal EV/EBITDA multiple to the target's — if the acquirer's multiple is higher, the deal is automatically accretive.",
   "Accretion/dilution analysis compares the NPV of synergies to the premium paid — if synergy NPV exceeds the premium, the deal is accretive to shareholder value.",
   "Accretion/dilution is calculated by dividing the combined entity's total revenue by the acquirer's standalone revenue — a ratio above 1x indicates accretion."]},

{cat:MA,q:"What makes a deal accretive?",
a:"Key driver: <strong>target's earnings yield vs cost of consideration.</strong> Stock deal: if target P/E &lt; acquirer P/E → target's earnings yield &gt; Ke → accretive. Debt deal: if target's earnings yield &gt; after-tax cost of debt → accretive.",
d:["A deal is accretive whenever the acquirer pays a premium of less than 30% — above this threshold, dilution always exceeds synergy value.",
   "Accretion depends solely on the size of cost synergies — revenue synergies are too uncertain to include in the accretion/dilution calculation.",
   "A deal is accretive if the target's revenue growth rate exceeds the acquirer's — faster-growing targets always improve the combined entity's EPS trajectory."]},

{cat:MA,q:"What is a fairness opinion?",
a:"Written opinion from a financial adviser that the transaction consideration is <em>fair, from a financial point of view,</em> to target shareholders. Required by boards for fiduciary protection. Based on full valuation work. Often completion-contingent fee creates a conflict of interest.",
d:["A fairness opinion is a regulatory filing submitted to ASIC confirming the transaction price is above the target's book value and does not constitute market manipulation.",
   "A fairness opinion is an audit of the target's financial statements conducted by the acquirer's Big 4 accounting firm during the due diligence process.",
   "A fairness opinion is a legal opinion from the target's solicitors confirming that the transaction structure does not breach the Corporations Act or ASIC regulations."]},

{cat:MA,q:"What is the difference between an asset deal and a stock deal?",
a:"<strong>Asset deal:</strong> Buyer acquires specific assets — tax step-up in basis (more future D&A), avoids unknown liabilities. Preferred by buyers. <strong>Stock deal:</strong> Buyer acquires the entire legal entity including all liabilities. Simpler contract/licence transfers. Preferred by sellers (capital gains treatment).",
d:["Asset deals are always preferred by sellers — they allow the seller to cherry-pick which liabilities to transfer and retain the most valuable assets.",
   "Stock deals provide a tax step-up for the acquirer — the buyer can depreciate the full purchase price over the asset's remaining useful life.",
   "Asset and stock deals are economically identical — the only difference is the legal structure, which has no impact on the ultimate tax outcome for either party."]},

{cat:MA,q:"What regulatory approvals might a large Australian deal require?",
a:"<strong>ACCC</strong> (competition — substantial lessening of competition), <strong>FIRB</strong> (foreign investment above sector thresholds), <strong>APRA</strong> (financial sector acquisitions), and <strong>ASX Listing Rules</strong> (shareholder approval if issuing &gt;10% of acquirer's shares).",
d:["Australian M&A requires only ASIC approval — ASIC reviews all transactions above $100M to ensure they comply with continuous disclosure and market manipulation rules.",
   "The only regulatory requirement is a shareholder vote — any acquisition above 5% of the target's shares requires approval from the acquirer's shareholders.",
   "Large Australian deals require RBA approval for any foreign currency component and Treasury sign-off for transactions involving privatisation of government assets."]},

{cat:MA,q:"What is an earnout and what is the key risk for sellers?",
a:"Contingent consideration paid if the business hits agreed post-close targets (e.g. EBITDA &gt; $X in year 2). Bridges valuation gaps when buyer/seller disagree on future performance. Key risk: <strong>the buyer controls the business post-close</strong> and can influence whether targets are met.",
d:["An earnout is a seller financing arrangement where the target's management loans the purchase price to the acquirer and is repaid from future operating cash flows.",
   "An earnout is a break-up fee paid by the seller if the business underperforms post-close — it protects the acquirer against downside operational risk.",
   "An earnout is a mechanism where the acquirer pays the full purchase price upfront but receives a refund if the target's post-close EBITDA falls below a threshold."]},

{cat:MA,q:"How is synergy value typically split between buyer and seller?",
a:"In competitive auctions, most synergy value accrues to target shareholders — buyers 'pay away' synergies in the premium. Strategic buyers pay away ~50–75% of synergy value. PE buyers (no synergies) rely on standalone improvement. Less competition → buyer retains more synergy value.",
d:["Synergies are split 50/50 between buyer and seller by convention — half is reflected in the premium paid and half is retained by the acquirer as NPV.",
   "Buyers retain all synergy value — synergies are a reward for taking the operational risk of integration and are never shared with target shareholders.",
   "Synergy value is split in proportion to relative market caps — the larger company retains a proportionally larger share of the combined synergy benefit."]},

{cat:MA,q:"What is a dual-track process?",
a:"Running an <strong>IPO and M&A sale simultaneously.</strong> Management prepares for both; best outcome determines the route. The IPO threat creates urgency among bidders. Common for PE exits. Requires significant management bandwidth and dual fee commitments.",
d:["A dual-track process runs two separate M&A auctions simultaneously — one for strategic buyers and one for PE buyers — to maximise competitive tension.",
   "A dual-track process is where a company pursues both debt and equity financing simultaneously — issuing bonds and shares at the same time to fund an acquisition.",
   "A dual-track process runs a public tender offer and a private negotiated sale simultaneously — whichever closes first determines the final transaction structure."]},

{cat:MA,q:"What is the Corporations Act s606 threshold and why does it matter?",
a:"Section 606 prohibits acquiring <strong>voting power above 20%</strong> in an ASX-listed company except via: formal takeover bid, shareholder-approved placement, or creep acquisition (3% per 6 months). It forces acquirers to make a formal bid once they approach control.",
d:["Section 606 sets the minimum ownership threshold at which a company must be consolidated — once you own more than 20%, the target's financials are fully incorporated.",
   "Section 606 requires any shareholder above 5% to disclose their holding — the 20% threshold triggers a mandatory bid obligation under the Corporations Act.",
   "Section 606 limits the maximum stake any single institutional investor can hold in an ASX-listed company to 15% without ASIC approval."]},

{cat:MA,q:"What is a hostile takeover and what is a poison pill defence?",
a:"A hostile takeover is a bid made directly to shareholders without target board support. A <strong>poison pill</strong> (rights plan) dilutes the hostile bidder's stake if they cross a threshold — making the bid prohibitively expensive and forcing the bidder to negotiate with the board.",
d:["A poison pill is a financial instrument that automatically converts a hostile bid into equity — the acquirer's debt is converted to shares, reducing their financial firepower.",
   "A poison pill is a contract clause requiring the target's management to resign if a hostile acquirer reaches 50.1% — making the business ungovernable post-acquisition.",
   "A poison pill is a court injunction filed by the target to freeze the acquirer's shares during the bid period, preventing them from reaching the control threshold."]},

// ── LBO ───────────────────────────────────────────────────────────────────────
{cat:L,q:"What are the key value creation drivers in an LBO?",
a:"(1) <strong>Debt paydown</strong> — FCF reduces debt; equity value grows as EV stays constant. (2) <strong>EBITDA growth</strong> — organic growth, margin expansion, add-ons. (3) <strong>Multiple expansion</strong> — exit at higher EV/EBITDA than entry. Sponsors rely on #1 and #2; #3 is a bonus outside their control.",
d:["The primary value driver is multiple expansion — PE firms exclusively target undervalued companies where they can immediately re-rate the EV/EBITDA multiple at entry.",
   "Value creation in an LBO comes entirely from leverage — the tax shield on interest payments is the only source of return above the unlevered cost of equity.",
   "The key driver is revenue growth — PE firms target businesses that can double revenue within 3 years, making EBITDA growth and debt reduction secondary considerations."]},

{cat:L,q:"What makes a good LBO candidate?",
a:"Strong predictable FCF; low existing leverage; stable market position; clear improvement levers; multiple exit paths; experienced management. Nice-to-haves: asset-light model, non-cyclical revenues, fragmented industry (roll-up), motivated seller.",
d:["The ideal LBO candidate is a high-growth technology company with negative FCF — PE firms tolerate cash burn in exchange for rapid EBITDA growth and multiple expansion.",
   "Good LBO candidates have high capex requirements — heavy asset bases provide collateral for debt financing and reduce the equity contribution needed.",
   "PE firms prefer businesses with strong existing leverage — already-levered companies demonstrate capacity for high debt loads and are easier to finance."]},

{cat:L,q:"What is a typical PE fund's target IRR and approximate MoM equivalent?",
a:"Gross IRR: <strong>20–25%+.</strong> Net IRR to LPs after fees and carry: 15–20%. MoM benchmarks: 2x/5yr ≈ 15%; 3x/5yr ≈ 25%; 2x/3yr ≈ 26%. Holding period matters — 2x in 3 years is far better than 3x in 10 years.",
d:["PE funds target a gross IRR of 8–12% — reflecting the risk-free rate plus a moderate illiquidity premium for locking up capital for 5–7 years.",
   "PE funds target a 50x MoM return on every deal — this means the average deal only needs to return 2–3x to achieve the portfolio target after accounting for losses.",
   "PE funds target a 40% IRR — to achieve this, they need every deal to return at least 5x MoM within 3 years, regardless of holding period."]},

{cat:L,q:"Walk through a numerical example of how leverage amplifies equity returns in an LBO.",
a:"Buy $100M EV: $40M equity + $60M debt. Exit at $130M EV, having repaid $20M debt. Exit equity = $130M − $40M = $90M. MoM = 2.25x. Without leverage (all equity): exit $130M → MoM = 1.3x. Leverage converted a 30% EV gain into a 125% equity gain.",
d:["Buy $100M EV: $40M equity + $60M debt. Exit at $130M EV. Exit equity = $130M − $60M = $70M. MoM = $70/$40 = 1.75x. Leverage amplifies returns by approximately 35% vs an all-equity purchase.",
   "Buy $100M EV: $40M equity + $60M debt. Exit at $130M EV. MoM = $130M / $40M = 3.25x because equity holders capture the full EV at exit regardless of debt outstanding.",
   "Buy $100M EV: $40M equity + $60M debt. EBITDA grows 20%; EV stays flat. Exit equity = $0M because the debt hasn't been repaid — leverage destroys returns when EV doesn't grow."]},

{cat:L,q:"What is the difference between maintenance and incurrence covenants?",
a:"<strong>Maintenance covenants:</strong> Tested quarterly — breach = immediate default (e.g. leverage ≤ 5x). Common in bank loans. <strong>Incurrence covenants:</strong> Triggered only if borrower takes a specific action (more debt, dividend). Common in HY bonds. PE sponsors prefer cov-lite structures.",
d:["Maintenance covenants apply to bond debt; incurrence covenants apply to bank loans — the distinction reflects the different risk tolerance of each investor class.",
   "Both are tested quarterly — the difference is that maintenance covenants apply to the whole company while incurrence covenants only apply to new subsidiaries.",
   "Maintenance covenants require the borrower to maintain a minimum cash balance; incurrence covenants cap the total amount of debt the company can incur over its lifetime."]},

{cat:L,q:"What is a dividend recapitalisation?",
a:"Company raises new debt post-buyout; proceeds used to pay a <strong>special dividend</strong> to the PE sponsor — returning capital before exit. Crystallises partial return early. Risk: increases leverage on the operating business. Can signal either strong FCF capacity or limited exit options.",
d:["A dividend recap is when the PE-owned company pays regular quarterly dividends from operating cash flow — a standard return mechanism alongside eventual exit.",
   "A dividend recap is when the PE sponsor converts its equity stake into preference shares that pay a fixed dividend — reducing exit risk by generating current income.",
   "A dividend recap occurs at exit — the acquiring company borrows against the target's assets and uses the proceeds to fund the purchase price instead of raising equity."]},

{cat:L,q:"What is multiple arbitrage in a PE roll-up strategy?",
a:"If a platform trades at 10x EBITDA and acquires a smaller add-on at 6x, the acquired EBITDA is immediately valued at 10x — creating instant equity value from the 4x multiple difference. Relies on the market continuing to value scale at a premium.",
d:["Multiple arbitrage means the PE fund acquires the same company through different legal entities simultaneously — each entity buys at a different price, with the average acquisition cost below market value.",
   "Multiple arbitrage refers to the IRR uplift from exiting at a higher multiple than entry — it is unrelated to the size of add-on acquisitions relative to the platform company.",
   "Multiple arbitrage occurs when the PE fund sells the same asset to two different strategic buyers simultaneously, with each buyer paying the full enterprise value independently."]},

{cat:L,q:"What is EBITDA to cash conversion and why does it matter in LBO analysis?",
a:"<strong>Cash conversion = Levered FCF / EBITDA.</strong> Measures what % of EBITDA becomes free cash to repay debt. Reduced by: high interest, capex, WC build, taxes. 80%+ cash conversion is ideal for LBOs — it generates reliable cash to service and repay debt.",
d:["Cash conversion = Net Income / EBITDA — measures how much operating profit converts to net earnings after accounting for D&A, interest, and tax charges.",
   "Cash conversion = Operating CF / Revenue — measures the percentage of sales that ultimately becomes cash available for distribution to investors.",
   "Cash conversion = FCF / Capex — compares cash generation to reinvestment spending, indicating whether a business is growing or maintaining its asset base."]},

{cat:L,q:"What is 'dry powder' in private equity?",
a:"Committed but undeployed capital — money LPs have committed to a fund that hasn't yet been invested. Represents the fund's available firepower for new deals. High industry-wide dry powder drives up deal valuations (more competition for assets).",
d:["Dry powder is the uninvested cash held by portfolio companies — PE firms require companies to maintain cash reserves to fund working capital and debt service.",
   "Dry powder refers to the remaining debt capacity in an LBO structure — how much additional debt a company can take on before breaching its leverage covenants.",
   "Dry powder is the fee reserve held by PE funds — 2% management fee on committed capital that is set aside before being deployed into portfolio companies."]},

{cat:L,q:"What are the main risks that can cause an LBO to generate a loss?",
a:"(1) Over-leverage: EBITDA falls → can't cover interest → default. (2) Cyclical downturn: revenue decline compresses FCF below debt service. (3) Multiple compression: exit multiple below entry — magnified by leverage. (4) Operational underperformance: thesis fails. (5) Refinancing risk: debt wall during tight credit markets.",
d:["The main LBO risk is currency exposure — most LBOs are dollar-denominated, so a strengthening AUD reduces the AUD value of exit proceeds for international sponsors.",
   "LBOs most commonly fail due to management buyout disputes — when the incumbent management team refuses to participate in the equity plan, operational performance deteriorates.",
   "The primary LBO risk is regulatory — antitrust authorities frequently block PE acquisitions because they concentrate ownership of businesses across multiple industries."]},

// ── MARKETS ───────────────────────────────────────────────────────────────────
{cat:MK,q:"What is the yield curve and why does an inverted curve historically matter?",
a:"Plots government bond yields across maturities. <strong>Normal:</strong> upward slope. <strong>Inverted</strong> (short &gt; long yields): has preceded every US recession since 1955 — signals the market expects rates to fall due to slowing growth. The 2yr/10yr spread is most watched.",
d:["An inverted yield curve occurs when corporate bond yields fall below government bond yields — signalling a credit bubble and imminent banking system stress.",
   "The yield curve plots share price performance across sectors — an inverted curve occurs when defensive sectors outperform cyclicals, signalling economic slowdown.",
   "An inverted yield curve only matters for banks — because they borrow short and lend long, inversion compresses their net interest margin and reduces profitability."]},

{cat:MK,q:"Why do bond prices fall when interest rates rise?",
a:"Existing bonds have fixed coupons. When new bonds are issued at higher yields, existing lower-coupon bonds are less attractive — their prices fall to equalise yield-to-maturity. <strong>Price ↑ when yield ↓; Price ↓ when yield ↑.</strong>",
d:["Bond prices fall when rates rise because higher rates reduce corporate earnings — lower earnings reduce the value of corporate bonds as the issuer's capacity to repay is impaired.",
   "Bond prices and interest rates move in the same direction — when rates rise, investors demand higher-yielding bonds, so existing bond prices adjust upward to match.",
   "Bond prices fall when rates rise because the central bank sells bonds from its balance sheet to raise rates — the increased supply depresses secondary market prices."]},

{cat:MK,q:"What is duration and why do long-duration assets fall most when rates rise?",
a:"Duration measures the <strong>price sensitivity of a bond to rate changes.</strong> Modified duration of 7 → bond falls ~7% if rates rise 1%. Longer maturity and lower coupon → higher duration. Growth stocks and infrastructure behave like long-duration assets — most cash flows are far in the future.",
d:["Duration measures the average time to maturity of a bond portfolio — long-duration portfolios are riskier because they take longer to return principal to investors.",
   "Duration measures the ratio of a bond's coupon payments to its face value — a high-coupon bond has high duration and is therefore most sensitive to rate changes.",
   "Duration is the total number of coupon payments remaining on a bond — long-duration bonds have more payments outstanding and therefore more interest rate exposure."]},

{cat:MK,q:"What is quantitative easing (QE) and how does it affect asset prices?",
a:"Central bank buys financial assets (typically government bonds) to inject liquidity and lower long-term rates. Effects: (1) lower Rf → compressed discount rates → higher valuations; (2) portfolio rebalancing into riskier assets; (3) currency depreciation; (4) higher inflation expectations.",
d:["QE involves the central bank printing physical banknotes and distributing them directly to households — stimulating consumer spending and boosting inflation to the 2% target.",
   "QE requires the government to issue new bonds and immediately retire them — reducing net public debt and freeing up fiscal space for targeted tax cuts.",
   "QE is when the central bank reduces the reserve requirement for banks — forcing them to lend more of their deposits into the economy rather than holding excess reserves."]},

{cat:MK,q:"What is the equity risk premium (ERP)?",
a:"<strong>ERP = Expected Market Return − Risk-Free Rate.</strong> Additional return investors demand for holding equities over risk-free assets. Historical: ~5–6% in developed markets. Key CAPM input — changes in ERP directly affect cost of equity and all DCF valuations.",
d:["ERP = Dividend Yield + Earnings Growth Rate — it represents the total expected return from equities, decomposed into income and capital gain components.",
   "ERP = Beta × (Market Return − Risk-Free Rate) — it adjusts the market risk premium for the specific systematic risk of the company being valued.",
   "ERP = P/E Multiple − Bond Yield — it measures the relative attractiveness of equities vs bonds by comparing their respective valuation multiples."]},

{cat:MK,q:"What drove equity market declines in 2022?",
a:"(1) Inflation shock — CPI hit 40-year highs post-COVID supply disruption and fiscal stimulus. (2) Rate hikes — Fed raised 425bps in 12 months (fastest since Volcker), compressing multiples via higher WACC. (3) Ukraine invasion — energy/commodity price spike, European growth shock.",
d:["2022 equity declines were driven by collapsing corporate earnings — profit margins fell sharply as companies failed to pass through rising input costs to customers.",
   "2022 declines were driven by the unwinding of meme stock speculation — retail investors who had inflated markets in 2020–21 exited simultaneously, causing broad market collapse.",
   "2022 declines were caused by China's property market crisis — Evergrande's default triggered contagion across global credit markets and destroyed investor confidence."]},

{cat:MK,q:"What is a credit spread and what does widening signal?",
a:"<strong>Credit spread = Corporate bond yield − Risk-free yield (same maturity).</strong> Compensates for default risk and illiquidity. Widening signals: rising perceived default risk, falling risk appetite, deteriorating macro outlook. HY spreads are a leading indicator of economic stress.",
d:["Credit spread = Government bond yield − Corporate bond yield — it measures the premium governments pay over corporations for the same maturity, reflecting sovereign risk.",
   "Credit spread = Short-term rate − Long-term rate — it measures the steepness of the yield curve and predicts future economic growth and inflation expectations.",
   "Credit spread = Equity earnings yield − Bond yield — it compares equity and fixed income valuations, widening when stocks become cheaper relative to bonds."]},

{cat:MK,q:"What is the difference between investment grade and high yield debt?",
a:"<strong>IG:</strong> BBB−/Baa3 or above — lower default risk, lower yield, most institutional mandates restricted to IG. <strong>HY:</strong> BB+/Ba1 or below ('junk') — higher default risk and yield. LBO financing is almost always HY. 'Fallen angels' (IG → HY) face forced selling.",
d:["IG debt has maturities under 5 years; HY debt has maturities above 10 years — the distinction reflects the risk tolerance of investors at different time horizons.",
   "IG debt is issued by governments; HY debt is issued by corporations — the credit rating reflects the sovereign vs corporate default risk differential.",
   "IG debt is fixed rate; HY debt is always floating rate — the floating rate structure compensates HY investors for taking on additional interest rate risk."]},

{cat:MK,q:"What is the VIX and what does a reading above 30 signal?",
a:"CBOE Volatility Index — measures implied volatility of 30-day S&P 500 options ('fear gauge'). Normal: 15–20. Above 30 = significant market stress (GFC peak ~80; COVID March 2020 ~85). High VIX compresses risk appetite, widens credit spreads, and typically freezes M&A and capital markets.",
d:["The VIX measures the actual realised volatility of S&P 500 returns over the trailing 30 days — above 30 signals that markets have already experienced significant drawdowns.",
   "The VIX measures the average daily trading volume in S&P 500 options — above 30 signals excessive speculative activity and an imminent market correction.",
   "The VIX is an index of the 30 most volatile S&P 500 stocks — above 30 signals that high-beta stocks are outperforming defensives, indicating risk-on sentiment."]},

{cat:MK,q:"What drives the AUD/USD exchange rate?",
a:"(1) Iron ore and commodity prices — AUD tracks the commodity complex. (2) Interest rate differentials vs USD. (3) China economic conditions — Australia's largest trading partner. (4) Risk sentiment — AUD is 'risk-on', weakens in risk-off environments. (5) Current account balance.",
d:["AUD/USD is determined entirely by the RBA — the central bank sets a target exchange rate band and intervenes in FX markets to maintain AUD within that range.",
   "AUD/USD is driven primarily by Australian inflation — when Australian CPI exceeds US CPI, the AUD appreciates to restore purchasing power parity between the two economies.",
   "AUD/USD is controlled by the Australian federal government — the Treasury sets the exchange rate in consultation with trading partners to manage the current account deficit."]},

{cat:MK,q:"What is Basel III and why does it matter to capital markets?",
a:"International regulatory framework for banks (post-GFC). Key requirements: higher minimum capital ratios (CET1 ≥ 4.5%); leverage ratio limits; liquidity coverage ratio (LCR). Impact: banks hold more capital → less balance sheet for lending and market-making → higher borrowing costs, wider bid-ask spreads.",
d:["Basel III is an accounting standard that requires banks to mark their loan portfolios to market — it increases earnings volatility but improves transparency for investors.",
   "Basel III is an ASIC regulation requiring Australian banks to hold 20% of their loan book in government bonds — ensuring liquidity during periods of market stress.",
   "Basel III sets minimum profitability requirements for banks — institutions with ROE below 10% must raise equity capital to restore their return on regulatory capital."]},

{cat:MK,q:"What is the difference between a bond and a syndicated loan?",
a:"<strong>Loan:</strong> Private, negotiated with banks, floating rate, maintenance covenants, more flexible terms, relationship-driven. <strong>Bond:</strong> Publicly issued, tradeable in secondary markets, fixed rate typical, broader investor base, incurrence covenants, higher minimum deal size. IB earns fees on both.",
d:["Bonds have shorter maturities than loans — bonds typically mature in 1–3 years while loans extend to 7–10 years, reflecting the risk appetite of each investor class.",
   "The only difference is the interest rate — bonds always pay fixed rates while loans always pay floating rates, reflecting the different risk profiles of the investor base.",
   "Loans are issued by governments; bonds are issued by corporations — the distinction reflects the different legal frameworks governing sovereign vs corporate debt instruments."]},

// ── QUICK MATH ────────────────────────────────────────────────────────────────
{cat:QM,q:"EV = $500M, EBITDA = $50M. What is the EV/EBITDA multiple?",
a:"<span class='math'>$500M ÷ $50M = 10.0x</span>. The market pays $10 for every $1 of EBITDA. The reciprocal (10%) is the EBITDA yield — compare to sector median to assess relative value.",
d:["$500M ÷ $50M = 0.1x — EV/EBITDA multiples are expressed as decimals, so 0.1x means the company is valued at 10% of its EBITDA.",
   "$500M × $50M = $25,000M — EV/EBITDA multiples are calculated by multiplying EV and EBITDA to produce a combined value metric.",
   "$50M ÷ $500M = 10x — the multiple is calculated by dividing EBITDA by EV, which measures how much EBITDA the company generates per dollar of enterprise value."]},

{cat:QM,q:"Revenue = $200M, EBIT margin = 15%, D&A = $10M. What is EBITDA?",
a:"EBIT = $200M × 15% = $30M. EBITDA = $30M + $10M = <span class='math'>$40M</span>. EBITDA margin = 40/200 = <span class='math'>20%</span>.",
d:["EBIT = $200M × 15% = $30M. EBITDA = $30M − $10M = $20M (D&A is subtracted because it reduces cash flow).",
   "EBITDA = Revenue × EBIT margin = $200M × 15% = $30M (D&A is already excluded from the EBIT margin calculation).",
   "EBIT = $200M − 15% = $185M. EBITDA = $185M + $10M = $195M (margin means dollars subtracted, not a percentage applied)."]},

{cat:QM,q:"What is 15% of $340M? Do it mentally.",
a:"10% = $34M. 5% = $17M. 15% = <span class='math'>$51M</span>. Mental shortcut: always decompose to 10% + 5% in interviews.",
d:["10% = $34M. 15% = $34M × 1.5 = $51M — multiply the 10% figure by 1.5 to get 15%.",
   "15% of $340M = $340M / 15 = $22.7M — divide by the percentage to get the portion.",
   "15% = $340M × 0.015 = $5.1M — the percentage must be expressed as a decimal by dividing by 1,000."]},

{cat:QM,q:"PE buys at $300M EV (60% debt). Exits at $500M EV 5 years later having repaid $80M of debt. What is MoM?",
a:"Entry equity = $300M − $180M = $120M. Exit debt = $180M − $80M = $100M. Exit equity = $500M − $100M = $400M. MoM = $400M ÷ $120M = <span class='math'>3.33x</span>.",
d:["Entry equity = $120M. Exit equity = $500M (full EV accrues to equity at exit). MoM = $500M ÷ $120M = 4.17x.",
   "Entry equity = $120M. Exit equity = $500M − $180M = $320M (original debt unchanged). MoM = $320M ÷ $120M = 2.67x.",
   "Entry equity = $300M (full EV). Exit equity = $500M. MoM = $500M ÷ $300M = 1.67x (no leverage effect)."]},

{cat:QM,q:"Approximate the IRR for a 3x MoM over 5 years.",
a:"(3)^(1/5) − 1 = <span class='math'>~24.6% IRR</span>. Memorise: 2x/5yr ≈ 15%; 3x/5yr ≈ 25%; 2x/3yr ≈ 26%; 3x/3yr ≈ 44%.",
d:["3x MoM over 5 years = 3/5 = 60% IRR — divide MoM by holding period years to get approximate annualised return.",
   "3x MoM over 5 years ≈ 40% IRR — double the MoM percentage (3x = 300% total return ÷ 5 years × growth factor = ~40%).",
   "3x MoM over 5 years ≈ 10% IRR — calculated as (3−1)/5/2 to adjust for compounding, similar to a bond's approximate yield to maturity formula."]},

{cat:QM,q:"WACC = 10%, terminal growth = 2.5%, terminal FCF = $100M. What is terminal value?",
a:"TV = $100M × 1.025 ÷ (0.10 − 0.025) = $102.5M ÷ 0.075 = <span class='math'>$1,367M</span>. Note how small the denominator is — TV is extremely sensitive to the WACC/growth assumptions.",
d:["TV = $100M ÷ (0.10 − 0.025) = $100M ÷ 0.075 = $1,333M (the (1+g) adjustment is omitted because it approximates to 1 for small growth rates).",
   "TV = $100M × (1.025 ÷ 0.10) = $100M × 10.25 = $1,025M (growth is divided by WACC rather than netted against it).",
   "TV = $100M ÷ 0.10 × (1 + 0.025) = $1,025M (WACC and growth are applied sequentially rather than as a net rate)."]},

{cat:QM,q:"EV = $600M, net debt = $100M, diluted shares = 50M. Implied share price?",
a:"Equity Value = $600M − $100M = $500M. Share price = $500M ÷ 50M = <span class='math'>$10.00</span>.",
d:["Equity Value = $600M + $100M = $700M (add net debt). Share price = $700M ÷ 50M = $14.00.",
   "Equity Value = $600M (net debt is already excluded from EV). Share price = $600M ÷ 50M = $12.00.",
   "Equity Value = $100M (net debt only — the EV component belongs to debt holders). Share price = $100M ÷ 50M = $2.00."]},

{cat:QM,q:"EBITDA = $60M, D&A = $15M, interest = $10M, tax = 30%. What is net income?",
a:"EBIT = $60M − $15M = $45M. EBT = $45M − $10M = $35M. Tax = $35M × 30% = $10.5M. Net income = <span class='math'>$24.5M</span>.",
d:["EBIT = $60M − $15M = $45M. EBT = $45M − $10M = $35M. Net income = $35M × (1−0.30) = $24.5M ✓ (same result, different framing).",
   "Net income = EBITDA × (1−tax rate) = $60M × 0.70 = $42M (D&A and interest are non-cash/non-operating so excluded from the tax calculation).",
   "Net income = (EBITDA − Interest) × (1−tax) = ($60M − $10M) × 0.70 = $35M (D&A is excluded because it's already reflected in the EBITDA-to-EBIT bridge)."]},

{cat:QM,q:"20M shares outstanding, $50M net cash, EV = $400M. Implied share price?",
