{cat:QM,q:"What is 1.25 × 1.25 and why does it matter in finance?",a:"<span class='math'>1.25 × 1.25 = 1.5625</span><br><br>Two years of 25% growth = 56.25% total return — not 50%. Compounding is non-linear. Interviewers test whether candidates instinctively understand compounding vs simple addition. Critical for IRR vs simple return comparisons."},
{cat:QM,q:"Revenue $200M, 30% EBITDA margin, 10x EV/EBITDA, net debt $80M, 20M shares. Implied share price?",a:"EBITDA = $200M × 30% = $60M<br>EV = $60M × 10 = $600M<br>Equity = $600M − $80M = $520M<br>Share price = $520M ÷ 20M = <span class='math'>$26.00</span>"},
{cat:QM,q:"FCF yield: business generates $20M FCF, price = $200M. What is the yield?",a:"<span class='math'>$20M ÷ $200M = 10% FCF yield</span><br><br>Reciprocal of 10x EV/FCF. If WACC = 9%, FCF yield > WACC → buying this business creates value. If FCF yield &lt; WACC → you're overpaying relative to required return."},
{cat:QM,q:"EBIT = $120M, tax rate = 25%. What is NOPAT?",a:"NOPAT = $120M × (1 − 0.25) = <span class='math'>$90M</span><br><br>NOPAT is the starting point for unlevered FCF in a DCF. It represents operating profit after tax, before the financing structure (interest) of the business."},
{cat:QM,q:"EPS = $4, P/E comp = 18x. Implied share price?",a:"<span class='math'>$4 × 18 = $72 per share</span><br><br>Earnings yield = 1/18 = 5.6%. If this stock is trading at $85, it's at a 18% premium to your comp-implied price."},
{cat:QM,q:"Approximate IRR for 2x MoM over 4 years.",a:"(2)^(1/4) − 1 = 1.189 − 1 = <span class='math'>~18.9% IRR</span><br><br>Below the typical 20%+ PE hurdle — a 2x in 4 years is a below-average PE return. A good LBO returns 2.5–3x in 4–5 years."},
{cat:QM,q:"A company has $300M EV and $50M EBITDA. EBITDA grows 20% in year 1, then acquired at same 6x multiple. New EV?",a:"New EBITDA = $50M × 1.20 = $60M<br>New EV = $60M × 6 = <span class='math'>$360M</span><br><br>20% EBITDA growth → 20% EV growth (assuming same multiple). Multiple is held constant here — real world often sees multiple re-rating alongside earnings growth."},
{cat:QM,q:"Interest expense = $20M, EBIT = $60M. Interest coverage ratio?",a:"<span class='math'>$60M ÷ $20M = 3.0x interest coverage</span><br><br>Above the typical 2.5x bank covenant floor — comfortable. Below 2x = lender concern. Below 1x = company cannot cover interest from operations — immediate distress signal."},
{cat:QM,q:"A company trades at 15x P/E. What is the earnings yield, and how does it compare to a 4.5% risk-free rate?",a:"Earnings yield = 1/15 = <span class='math'>6.67%</span><br><br>Equity risk premium implied = 6.67% − 4.5% = 2.17%.<br><br>This is below the historical long-run ERP of ~5–6%, suggesting the stock is richly valued relative to bonds on a pure yield comparison."},
// ── BEHAVIOURAL (20) ─────────────────────────────────────────────────────────
{cat:B,q:"Why investment banking?",a:"Best answers connect: (1) genuine intellectual interest in capital allocation, corporate strategy, and markets; (2) the deal exposure and learning curve IB uniquely provides; (3) specific calibre of mentorship and client access.<br><br>Be specific — reference a transaction, sector, or moment that crystallised your interest. Avoid: 'fast-paced environment,' 'best and brightest,' 'I want to work hard.'"},
{cat:B,q:"Why Morgan Stanley specifically?",a:"Reference real, specific things: a landmark MS deal, the group you're targeting and why, a conversation with an MS banker, MS research you found compelling, or platform breadth (institutional securities, investment management, IB under one roof).<br><br>Avoid: 'prestigious firm,' 'top-tier bank,' generic references to deal flow."},
{cat:B,q:"Tell me about yourself.",a:"Under 2 minutes. Structure: (1) academic background and key achievement; (2) most relevant experience and what you learned; (3) why IB now and why MS.<br><br>Goal: coherent narrative explaining why this role is the logical next step. End on forward-looking enthusiasm, not a list of past jobs."},
{cat:B,q:"What is your greatest weakness?",a:"Be genuine and strategic. Choose a real weakness not central to IB execution, with evidence you're actively managing it.<br><br>E.g. 'I sometimes over-prepare before sharing work — I've been pushing to share earlier drafts and iterate collaboratively.'<br><br>Avoid: humble-brags, implausible claims, anything that undermines your candidacy."},
{cat:B,q:"Tell me about a time you worked under pressure with a tight deadline.",a:"<strong>STAR:</strong> Situation, Task, Action (what <em>you</em> specifically did), Result (quantifiable).<br><br>Pick a real example with genuine stakes and time pressure. Show: composure, prioritisation, output quality. Avoid 'we' — the interviewer wants to know your specific contribution."},
{cat:B,q:"Tell me about a time there was conflict in a team.",a:"STAR. Show: (1) you recognised the conflict rather than ignoring it; (2) addressed it directly and constructively; (3) the team reached a productive outcome.<br><br>Don't cast anyone as a villain. Demonstrate you're someone people want to work through hard situations with."},
{cat:B,q:"Where do you see yourself in 5 years?",a:"Honest and ambitious: commit to building strong IB technical foundations, earning a return offer, and developing sector expertise.<br><br>Longer-term openness to PE/corporate development/continued banking is fine. Show ambition + realism. Avoid suggesting IB is just a 2-year stepping stone."},
{cat:B,q:"Tell me about a deal or market event that interested you recently.",a:"Have 2–3 live examples ready. Structure: (1) what happened; (2) why it's interesting strategically/financially; (3) your view or open question it raises.<br><br>Show you went beyond the headline — valuation logic, regulatory angle, synergy thesis. Authentic depth beats surface familiarity."},
{cat:B,q:"What do you know about what analysts actually do day-to-day?",a:"~<strong>80% execution:</strong> modelling, comps, updating materials, running data rooms, managing DD processes, 3am printer runs.<br>~<strong>20% pitching:</strong> sector overviews, company profiles, pitch materials.<br><br>Hours are extreme (80–100+ per week). Everything is reactive to deal demands. Acknowledge this — and demonstrate you've thought carefully about it."},
{cat:B,q:"Have you applied to other banks?",a:"Be honest but strategic: 'Yes, I have a small number of applications in at comparable firms, but MS is clearly my first choice for [specific reason].'<br><br>Don't name every firm. Don't claim you've applied nowhere else unless true. Don't over-explain."},
{cat:B,q:"Why did you study International Relations / your degree?",a:"Connect academic background to IB interest. IR provides: understanding of geopolitical risk, how political structures shape capital flows, macro-level analysis of economic outcomes.<br><br>The MAF demonstrates serious commitment to the technical transition. The combination — macro worldview + financial toolkit — is genuinely differentiated."},
{cat:B,q:"Describe a situation where you showed leadership.",a:"STAR. Leadership doesn't require a formal title — leading a project, persuading a team to change direction, mentoring others, driving a group outcome.<br><br>Show: (1) identified what needed to happen; (2) influenced others to act; (3) delivered an outcome; (4) what you'd do differently."},
{cat:B,q:"What makes a good investment banker?",a:"Technical excellence (modelling, financial analysis). Commercial judgment (what matters to clients). Communication (synthesise complexity simply). Work ethic and resilience. Intellectual curiosity. Obsessive attention to detail.<br><br>For junior bankers: execution discipline and ability to work autonomously under pressure."},
{cat:B,q:"Tell me about a time you made a mistake.",a:"STAR. Pick a genuine mistake — 'I can't think of one' is the wrong answer.<br><br>Structure: what happened, the impact, what you did to correct it, what you changed in your approach.<br><br>Show: accountability without defensiveness, and evidence that you update behaviour based on experience."},
{cat:B,q:"Do you have any questions for us?",a:"Always have 2–3 thoughtful questions:<br>• 'What does the best summer analyst you've seen do differently to stand out?'<br>• 'What's the deal flow looking like in [target sector] from your seat?'<br>• 'What aspect of the work surprised you most vs your expectations?'<br><br>Avoid: salary, holidays, promotions. Show genuine curiosity about their experience."},
{cat:B,q:"What sector are you most interested in and why?",a:"Have a genuine view with depth. Sectors with strong Australian deal flow: resources &amp; energy, infrastructure, financials, real estate, healthcare.<br><br>Connect to your background, experience, or a macro/investment thesis. Show you understand why the sector has active M&amp;A and capital markets demand."},
{cat:B,q:"How does your Ord Minnett background prepare you for IB?",a:"Draw direct connections: institutional client service (client management, communication under pressure); operational understanding of equity markets and trade execution; real exposure to institutional financial products (Wholesale Bonds FUM growth); team leadership; and regulatory compliance in a high-stakes environment.<br><br>Frame it as building foundations that IB will accelerate."},
{cat:B,q:"What is one thing you would change about your CV?",a:"Frame as a gap you're actively closing. E.g. 'I'd have started building financial modelling skills earlier — I've been addressing that through my MAF coursework and self-directed practice.'<br><br>Show self-awareness and a concrete action plan. Don't undermine your candidacy."},
{cat:B,q:"How do you approach a complex analytical task you've never done before?",a:"Show: (1) break the problem into components; (2) identify what you know vs need to find; (3) find the right resources (colleagues, research, prior work); (4) build a structured framework before executing; (5) review your own work critically before sharing.<br><br>Demonstrates intellectual comfort with ambiguity and systematic thinking."},
{cat:B,q:"What do you do outside work and uni?",a:"Be genuine — fabricated interests are obvious. Have 2–3 real interests you can speak to with specificity and enthusiasm.<br><br>For IB context, interests showing intellectual curiosity (markets, history, geopolitics), discipline (sport, fitness), or team contribution land well. Interviewers assess whether they'd want to spend 90+ hours/week with you."},
];

// ── State ─────────────────────────────────────────────────────────────────────
let filteredDeck=[...CARDS],idx=0,isFlipped=false,sessionKnown=0,sessionMissed=0;
let knownIds=new Set(),missedIds=new Set(),activeFilter="All";

// ── Init ──────────────────────────────────────────────────────────────────────
function init(){
  buildFilters();
  applyFilter("All");
}

function buildFilters(){
  const cats=["All",...new Set(CARDS.map(c=>c.cat))];
  const cont=document.getElementById("filters");
  cont.innerHTML="";
  cats.forEach(cat=>{
    const n=cat==="All"?CARDS.length:CARDS.filter(c=>c.cat===cat).length;
    const btn=document.createElement("button");
    btn.className="filter-btn"+(cat===activeFilter?" active":"");
    btn.textContent=`${cat} (${n})`;
    btn.onclick=()=>applyFilter(cat);
    cont.appendChild(btn);
  });
}

function applyFilter(cat){
  activeFilter=cat;
  filteredDeck=cat==="All"?[...CARDS]:CARDS.filter(c=>c.cat===cat);
  idx=0;isFlipped=false;sessionKnown=0;sessionMissed=0;knownIds.clear();missedIds.clear();
  document.querySelectorAll(".filter-btn").forEach(b=>{
    const label=b.textContent.replace(/ \(\d+\)$/,"");
    b.classList.toggle("active",label===cat);
  });
  hideComplete();
  document.getElementById("card-area").style.display="";
  renderCard();
  updateStats();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(){
  if(!filteredDeck.length)return;
  const card=filteredDeck[idx];
  isFlipped=false;
  document.getElementById("card-inner").classList.remove("flipped");
  document.getElementById("card-tag").textContent=card.cat.toUpperCase();
  document.getElementById("card-tag-back").textContent="Answer — "+card.cat;
  document.getElementById("card-q").textContent=card.q;
  document.getElementById("card-a").innerHTML=card.a;
  document.getElementById("card-counter").textContent=`${idx+1} / ${filteredDeck.length}`;
  document.getElementById("feedback-row").classList.remove("visible");
  document.getElementById("study-panel").style.display="none";
}

function flipCard(){
  if(!filteredDeck.length)return;
  isFlipped=!isFlipped;
  document.getElementById("card-inner").classList.toggle("flipped",isFlipped);
  document.getElementById("feedback-row").classList.toggle("visible",isFlipped);
}

function markCard(known){
  const globalId=CARDS.indexOf(filteredDeck[idx]);
  if(known){knownIds.add(globalId);missedIds.delete(globalId);sessionKnown++;}
  else{
    missedIds.add(globalId);knownIds.delete(globalId);sessionMissed++;
    showStudyPanel(filteredDeck[idx]);
  }
  updateStats();
  setTimeout(()=>{ nextCard(); }, known ? 0 : 1000);
}

function showStudyPanel(card){
  const links=STUDY_LINKS[card.cat]||[];
  if(!links.length)return;
  const lc=document.getElementById("study-panel-links");
  lc.innerHTML=links.map(l=>`<a href="${l.u}" target="_blank" rel="noopener">→ ${l.t}</a>`).join("");
  document.getElementById("study-panel").style.display="block";
}

function nextCard(){
  if(idx<filteredDeck.length-1){idx++;renderCard();}
  else{showComplete();}
}

function prevCard(){
  if(idx>0){idx--;renderCard();}
}

function shuffleDeck(){
  for(let i=filteredDeck.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [filteredDeck[i],filteredDeck[j]]=[filteredDeck[j],filteredDeck[i]];
  }
  idx=0;isFlipped=false;sessionKnown=0;sessionMissed=0;knownIds.clear();missedIds.clear();
  hideComplete();
  document.getElementById("card-area").style.display="";
  renderCard();updateStats();
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats(){
  const total=filteredDeck.length,reviewed=sessionKnown+sessionMissed,pct=total>0?Math.round(reviewed/total*100):0;
  document.getElementById("stat-known").textContent=sessionKnown;
  document.getElementById("stat-missed").textContent=sessionMissed;
  document.getElementById("stat-remaining").textContent=total-reviewed;
  document.getElementById("progress-fill").style.width=pct+"%";
  document.getElementById("progress-label").textContent=pct+"% complete";
}

// ── Complete ──────────────────────────────────────────────────────────────────
function showComplete(){
  document.getElementById("card-area").style.display="none";
  document.getElementById("feedback-row").classList.remove("visible");
  document.getElementById("complete-screen").classList.add("visible");

  const total=sessionKnown+sessionMissed,pct=total>0?Math.round(sessionKnown/total*100):0;
  document.getElementById("score-big").innerHTML=`<span>${sessionKnown}</span> / ${total}`;

  const msg=pct>=85
    ?"Strong recall. Now focus on verbal delivery — knowing it and articulating it under pressure are different skills. Drill any flagged cards aloud."
    :pct>=60
    ?"Solid base. Re-run missed cards and work on connecting concepts across topics. Interviewers always probe the links between accounting, valuation, and deal mechanics."
    :"Keep grinding. Focus on understanding the logic behind each answer — interviewers always ask a follow-up question to test whether you actually understand or just memorised.";
  document.getElementById("score-msg").textContent=msg;

  // Study section
  const missed=CARDS.filter((_,i)=>missedIds.has(i));
  const ss=document.getElementById("study-section");
  const sl=document.getElementById("study-list");
  if(missed.length>0){
    const missedCats=[...new Set(missed.map(c=>c.cat))];
    ss.style.display="block";
    sl.innerHTML=missedCats.map(cat=>{
      const count=missed.filter(c=>c.cat===cat).length;
      const links=STUDY_LINKS[cat]||[];
      return `<div class="study-item">
        <div><span class="study-item-cat">${cat}</span><span class="study-item-missed">${count} card${count>1?"s":""} missed</span></div>
        <div class="study-item-links">${links.map(l=>`<a href="${l.u}" target="_blank" rel="noopener">→ ${l.t}</a>`).join("")}</div>
      </div>`;
    }).join("");
  } else {
    ss.style.display="none";
  }
}

function hideComplete(){
  document.getElementById("complete-screen").classList.remove("visible");
}

function restartAll(){
  filteredDeck=activeFilter==="All"?[...CARDS]:CARDS.filter(c=>c.cat===activeFilter);
  idx=0;isFlipped=false;sessionKnown=0;sessionMissed=0;knownIds.clear();missedIds.clear();
  hideComplete();
  document.getElementById("card-area").style.display="";
  renderCard();updateStats();
}

function restartMissed(){
  const missed=CARDS.filter((_,i)=>missedIds.has(i));
  if(!missed.length){restartAll();return;}
  filteredDeck=missed;
  idx=0;isFlipped=false;sessionKnown=0;sessionMissed=0;knownIds.clear();missedIds.clear();
  hideComplete();
  document.getElementById("card-area").style.display="";
  renderCard();updateStats();
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener("keydown",e=>{
  if(document.activeElement.tagName==="BUTTON")return;
  if(e.key===" "||e.key==="Enter"){e.preventDefault();flipCard();}
  if(e.key==="ArrowRight")nextCard();
  if(e.key==="ArrowLeft")prevCard();
  if(e.key==="1"&&isFlipped)markCard(false);
  if(e.key==="2"&&isFlipped)markCard(true);
});

init();
</script>
